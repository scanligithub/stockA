name: Distributed Event Fetcher

on:
  schedule:
    - cron: '0 12 * * 5' # 每周五晚 20:00 自动执行一次
  workflow_dispatch:     # 支持随时手动触发

permissions:
  contents: write

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
        
      - name: Build Engine & Split 20 Chunks
        id: set-matrix
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go build -o tdx_fetcher scripts/tdx_fetcher.go
          ./tdx_fetcher -mode=list
          
          # 利用 Python 强制替换点号对齐索引，动态切割为 20 个负载均衡的物理矩阵
          python -c "
          import json, math
          master = json.load(open('stock_list_master.json'))
          valid = []
          for s in master:
              c = s['code'].replace('.', '').lower()
              if c.startswith('sh') and c[2:4] in ['60','68']:
                  valid.append(s['code'])
              elif c.startswith('sz') and c[2:4] in ['00','30']:
                  valid.append(s['code'])
              elif c.startswith('bj') and c[2:4] in ['43','83','87','92']:
                  valid.append(s['code'])
          
          NUM = 20
          chunk = math.ceil(len(valid)/NUM)
          matrix_data = [{'index': i, 'codes': valid[i*chunk:(i+1)*chunk]} for i in range(NUM) if valid[i*chunk:(i+1)*chunk]]
          print('matrix=' + json.dumps(matrix_data))
          " >> $GITHUB_OUTPUT

  fetch-events-matrix:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
        
      - run: pip install polars baostock
      
      - name: Fetch Event Part ${{ matrix.task.index }}
        run: |
          python scripts/fetch_events_forecast.py \
            --index ${{ matrix.task.index }} \
            --codes '${{ toJson(matrix.task.codes) }}'
            
      - uses: actions/upload-artifact@v4
        with:
          name: event-part-${{ matrix.task.index }}
          path: temp_parts/*.parquet
          retention-days: 1

  merge-and-save:
    needs: fetch-events-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
        
      - run: pip install polars
      
      - name: Download Matrix Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'event-part-*'
          merge-multiple: true
          path: all_artifacts
          
      - name: Merge All Parts
        run: python scripts/merge_events.py
        
      # 💾 将合并好的事件 Parquet 写入 GitHub Actions Cache 中
      - name: Save Event DB to GitHub Actions Cache
        uses: actions/cache/save@v4
        with:
          path: output/event_earnings_forecast.parquet
          key: event-forecast-cache-${{ github.run_id }}-${{ github.run_attempt }}

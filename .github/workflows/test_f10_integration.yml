name: Test F10 Integration (TDX List to EM Finance)

on:
  workflow_dispatch:

jobs:
  test-f10-from-tdx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Python Dependencies
        run: |
          pip install requests pandas tqdm tabulate
          
      - name: Build TDX Go Engine
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy
          go build -o tdx_fetcher scripts/tdx_fetcher.go
          
      - name: Generate Master Stock List (via TDX)
        run: |
          echo "🚀 Running TDX Engine to get stock list..."
          ./tdx_fetcher -mode=list
          ls -lh stock_list_master.json
          
      - name: Create & Run F10 Integration Script
        run: |
          cat << 'EOF' > test_f10_integration.py
          import json
          import random
          import requests
          import pandas as pd
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from tqdm import tqdm

          # 标准浏览器伪装，防云节点风控
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Referer": "https://quote.eastmoney.com/"
          }

          def fetch_f10_history(tdx_item):
              # 🛡️ 修复一：去除小数点，将 "sh.600000" 转换为 "sh600000"
              tdx_code = tdx_item['code'].replace('.', '').lower()         
              name = tdx_item.get('code_name', '')
              
              # 🔄 将 TDX 格式转换为东财 F10 格式 (e.g. SH600000)
              em_code = tdx_code.upper()
              
              url = f"https://emweb.securities.eastmoney.com/PC_HSF10/NewFinanceAnalysis/ZYZBAjaxNew?type=1&code={em_code}"
              
              try:
                  res = requests.get(url, headers=HEADERS, timeout=10)
                  data = res.json()
                  if data and data.get("data"):
                      return em_code, name, data["data"], None
                  return em_code, name, [], "接口返回无数据"
              except Exception as e:
                  return em_code, name, [], str(e)

          def main():
              print("🔍 读取 TDX 引擎生成的 stock_list_master.json...")
              try:
                  with open('stock_list_master.json', 'r', encoding='utf-8') as f:
                      master_list = json.load(f)
              except Exception as e:
                  print(f"❌ 读取 JSON 失败: {e}")
                  return

              valid_stocks = []
              for s in master_list:
                  # 🛡️ 修复二：严格 A股分类过滤器，只允许真正的上市公司进入列表
                  # 自动剥离板块概念指数（88xxxx）、可转债（11xxxx）、基金（51xxxx）和大盘指数
                  code = s['code'].replace('.', '').lower()
                  if code.startswith('sh') and code[2:4] in ['60', '68']:
                      valid_stocks.append(s)
                  elif code.startswith('sz') and code[2:4] in ['00', '30']:
                      valid_stocks.append(s)
                  elif code.startswith('bj') and code[2:4] in ['43', '83', '87', '92']:
                      valid_stocks.append(s)

              print(f"✅ 经过严格清洗，有效纯 A股股票总数: {len(valid_stocks)}")
              
              # 随机抽样 100 只作为测试集
              sample_size = min(100, len(valid_stocks))
              test_samples = random.sample(valid_stocks, sample_size)
              print(f"🎯 随机抽取了 {sample_size} 只【真实股票】进行 F10 压测...\n")
              
              results = []
              success_count, fail_count = 0, 0
              
              # 并发拉取
              with ThreadPoolExecutor(max_workers=10) as executor:
                  futures = {executor.submit(fetch_f10_history, s): s for s in test_samples}
                  for future in tqdm(as_completed(futures), total=len(test_samples), desc="拉取财报"):
                      em_code, name, data, err = future.result()
                      if data:
                          success_count += 1
                          results.append({"code": em_code, "name": name, "history_len": len(data), "raw_data": data})
                      else:
                          fail_count += 1
                          print(f"⚠️ 失败: {name}({em_code}) - {err}")
                          
              print("\n" + "="*60)
              print(f"📊 F10 财报获取统计：成功 {success_count} 只 | 失败 {fail_count} 只")
              
              if success_count > 0:
                  # 挑选出拿到财报季数最多的一只股票进行展示
                  longest = max(results, key=lambda x: x['history_len'])
                  print(f"\n🏆 财报历史最长股票: {longest['name']} ({longest['code']})，共 {longest['history_len']} 个季度！")
                  
                  df = pd.DataFrame(longest['raw_data'])
                  
                  # 提取 peTTM 和 pbMRQ 所需的 4 个核心基本面字段
                  target_cols = ['REPORT_DATE', 'UPDATE_DATE', 'PARENTNETPROFIT', 'BPS']
                  available_cols = [c for c in target_cols if c in df.columns]
                  
                  print("\n🌟 核心提取字段展示 (近 5 个季度)：")
                  print(df[available_cols].head(5).to_markdown(index=False))

          if __name__ == "__main__":
              main()
          EOF
          
          python test_f10_integration.py

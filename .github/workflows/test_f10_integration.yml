name: Test F10 Integration (TDX List to EM Finance)

on:
  workflow_dispatch:

jobs:
  test-f10-from-tdx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Python Dependencies
        run: |
          pip install requests pandas tqdm tabulate
          
      - name: Build TDX Go Engine
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy
          go build -o tdx_fetcher scripts/tdx_fetcher.go
          
      - name: Generate Master Stock List (via TDX)
        run: |
          echo "🚀 Running TDX Engine to get stock list..."
          ./tdx_fetcher -mode=list
          ls -lh stock_list_master.json
          
      - name: Create & Run DataCenter F10 Integration Script
        run: |
          cat << 'EOF' > test_f10_integration.py
          import json
          import random
          import requests
          import pandas as pd
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from tqdm import tqdm

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Referer": "https://quote.eastmoney.com/"
          }

          REPORT_NAME = "RPT_LICO_FN_CPD" # 锁定有效物理表
          WORKING_FILTER = None

          def explore_sql_syntax(pure_code, tdx_code):
              """🕵️ 使用绝对存在的 SECURITY_CODE 进行排序，绕开排序列崩溃，拿到列名底牌"""
              global WORKING_FILTER
              
              # 双引号纯代码格式已在上一轮中被 ANTLR 编译器认可
              flt = f'(SECURITY_CODE="{pure_code}")'
              
              url = "https://datacenter.eastmoney.com/api/data/v1/get"
              print(f"\n🕵️ 针对物理表 {REPORT_NAME} 执行 SQL 语法对齐测试 (使用样本: {tdx_code})...")
              
              params = {
                  "sortColumns": "SECURITY_CODE", # 🛡️ 核心修改：使用绝对存在的主键排序，绕过排序列异常
                  "sortTypes": "-1",
                  "pageSize": "3",
                  "pageNumber": "1",
                  "reportName": REPORT_NAME,
                  "columns": "ALL",
                  "filter": flt,
                  "client": "WEB"
              }
              try:
                  res = requests.get(url, params=params, headers=HEADERS, timeout=8)
                  data = res.json()
                  code = data.get("code")
                  message = data.get("message", "无")
                  
                  print(f"    - 测试语法: [{flt:<30}] ➔ 返回码: {code:<5} | 消息: {message}")
                  
                  if code == 0 and data.get("result") and data["result"].get("data"):
                      WORKING_FILTER = flt
                      print(f"🎉【对齐成功】成功绕过排序列门禁，过滤器模板锁定为: {flt}")
                      return True
              except Exception as e:
                  pass
              return False

          def fetch_f10_datacenter(tdx_item):
              global WORKING_FILTER
              tdx_code = tdx_item['code'].replace('.', '').lower()         
              name = tdx_item.get('code_name', '')
              pure_code = tdx_code[2:]
              
              # 字符串替换生成个股过滤器
              actual_filter = WORKING_FILTER.replace("PROBE_CODE", pure_code)
              
              url = "https://datacenter.eastmoney.com/api/data/v1/get"
              params = {
                  "sortColumns": "SECURITY_CODE", # 🛡️ 统一使用 SECURITY_CODE 排序
                  "sortTypes": "-1",
                  "pageSize": "120",
                  "pageNumber": "1",
                  "reportName": REPORT_NAME,
                  "columns": "ALL",
                  "filter": actual_filter,
                  "client": "WEB" 
              }
              
              try:
                  res = requests.get(url, params=params, headers=HEADERS, timeout=10)
                  data = res.json()
                  if data and data.get("result") and data["result"].get("data"):
                      return pure_code, name, data["result"]["data"], None
                  err_msg = f"状态码: {data.get('code', '无')}, 消息: {data.get('message', '未知')}"
                  return pure_code, name, [], err_msg
              except Exception as e:
                  return pure_code, name, [], str(e)

          def main():
              global WORKING_FILTER
              print("🔍 读取 TDX 股票列表...")
              try:
                  with open('stock_list_master.json', 'r', encoding='utf-8') as f:
                      master_list = json.load(f)
              except Exception as e:
                  print(f"❌ 读取 JSON 失败: {e}")
                  return

              valid_stocks = []
              for s in master_list:
                  code = s['code'].replace('.', '').lower()
                  if code.startswith('sh') and code[2:4] in ['60', '68']:
                      valid_stocks.append(s)
                  elif code.startswith('sz') and code[2:4] in ['00', '30']:
                      valid_stocks.append(s)
                  elif code.startswith('bj') and code[2:4] in ['43', '83', '87', '92']:
                      valid_stocks.append(s)

              print(f"✅ 有效 A股总数: {len(valid_stocks)}")
              
              sample_size = min(100, len(valid_stocks))
              test_samples = random.sample(valid_stocks, sample_size)
              
              # 使用随机抽取的第一个样本作为对齐种子
              sample_item = test_samples[0]
              sample_tdx_code = sample_item['code'].replace('.', '').lower()
              sample_pure_code = sample_tdx_code[2:]
              
              if not explore_sql_syntax(sample_pure_code, sample_tdx_code):
                  print("\n❌ 语法对齐失败：四种变体均未通过。")
                  return
                  
              # 建立可替换模板
              WORKING_FILTER = WORKING_FILTER.replace(sample_pure_code, "PROBE_CODE")
              print(f"🎯 建立可复用过滤器模板: {WORKING_FILTER}")
              print(f"🚀 开始并发拉取 {sample_size} 只股票的全量财报...\n")
              
              results = []
              success_count, fail_count = 0, 0
              
              with ThreadPoolExecutor(max_workers=10) as executor:
                  futures = {executor.submit(fetch_f10_datacenter, s): s for s in test_samples}
                  for future in tqdm(as_completed(futures), total=len(test_samples), desc="拉取全量财报"):
                      pure_code, name, data, err = future.result()
                      if data:
                          success_count += 1
                          results.append({"code": pure_code, "name": name, "history_len": len(data), "raw_data": data})
                      else:
                          fail_count += 1
                          print(f"⚠️ 失败: {name}({pure_code}) - {err}")
                          
              print("\n" + "="*60)
              print(f"📊 数据中心接口统计：成功 {success_count} 只 | 失败 {fail_count} 只")
              
              if success_count > 0:
                  longest = max(results, key=lambda x: x['history_len'])
                  print(f"\n🏆 财报历史最长股票: {longest['name']} ({longest['code']})，共 {longest['history_len']} 个季度！")
                  
                  df = pd.DataFrame(longest['raw_data'])
                  print("\n🔑 接口实际返回的全量字段列名 (大写字母形式)：")
                  print(", ".join(df.columns))
                  
                  # 财报表候选列映射
                  mapping_candidates = {
                      'REPORT_DATE': ['REPORT_DATE', 'REPORT_YEAR', 'F10_REPORT_DATE'],
                      'UPDATE_DATE': ['NOTICE_DATE', 'UPDATE_DATE', 'ACTUAL_PUBLISH_DATE', 'PUBLISH_DATE'],
                      'PARENTNETPROFIT': ['PARENT_NETPROFIT', 'PARENTNETPROFIT', 'NETPROFIT', '归母净利润'],
                      'BPS': ['BPS_MRQ', 'BPS', 'B_BPS', '每股净资产']
                  }
                  
                  real_cols = {}
                  for target, candidates in mapping_candidates.items():
                      for cand in candidates:
                          if cand in df.columns:
                              real_cols[target] = cand
                              break
                              
                  print(f"\n🎯 自动识别出来的对齐列名: {real_cols}")
                  
                  available_cols = list(real_cols.values())
                  if available_cols:
                      print("\n🌟 核心提取字段展示 (最新 5 个季度)：")
                      print(df[available_cols].head(5).to_markdown(index=False))
                      
                      print("\n🌟 核心提取字段展示 (远古历史底牌)：")
                      print(df[available_cols].tail(5).to_markdown(index=False))

          if __name__ == "__main__":
              main()
          EOF
          
          python test_f10_integration.py

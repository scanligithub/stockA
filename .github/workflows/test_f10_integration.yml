name: Test F10 Full Market Stress Test (5200+ Stocks)

on:
  workflow_dispatch:

jobs:
  full-market-f10:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Python Dependencies
        run: |
          pip install requests pandas tqdm tabulate pyarrow polars
          
      - name: Build TDX Go Engine
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy
          go build -o tdx_fetcher scripts/tdx_fetcher.go
          
      - name: Generate Master Stock List (via TDX)
        run: |
          echo "🚀 Running TDX Engine to get master list..."
          ./tdx_fetcher -mode=list
          ls -lh stock_list_master.json
          
      - name: Create & Run Full Market Stress Test Script
        run: |
          cat << 'EOF' > test_f10_full.py
          import json
          import random
          import requests
          import pandas as pd
          import time
          import os
          import polars as pl
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from tqdm import tqdm

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Referer": "https://quote.eastmoney.com/"
          }

          REPORT_NAME = "RPT_LICO_FN_CPD"
          WORKING_FILTER = None

          def explore_sql_syntax(pure_code, tdx_code):
              """🕵️ 语法对齐探测，确定物理表可用"""
              global WORKING_FILTER
              flt = f'(SECURITY_CODE="{pure_code}")'
              url = "https://datacenter.eastmoney.com/api/data/v1/get"
              params = {
                  "sortColumns": "SECURITY_CODE",
                  "sortTypes": "-1",
                  "pageSize": "3",
                  "pageNumber": "1",
                  "reportName": REPORT_NAME,
                  "columns": "ALL",
                  "filter": flt,
                  "client": "WEB"
              }
              try:
                  res = requests.get(url, params=params, headers=HEADERS, timeout=10).json()
                  if res.get("code") == 0:
                      WORKING_FILTER = flt
                      return True
              except:
                  pass
              return False

          def fetch_f10_datacenter_with_retry(tdx_item):
              """安全重试拉取：Go 种子 + 3次重试"""
              global WORKING_FILTER
              tdx_code = tdx_item['code'].replace('.', '').lower()         
              name = tdx_item.get('code_name', '')
              pure_code = tdx_code[2:]
              
              actual_filter = WORKING_FILTER.replace("PROBE_CODE", pure_code)
              url = "https://datacenter.eastmoney.com/api/data/v1/get"
              params = {
                  "sortColumns": "REPORTDATE",
                  "sortTypes": "1",           # 1代表升序
                  "pageSize": "150",          
                  "pageNumber": "1",
                  "reportName": REPORT_NAME,
                  "columns": "SECURITY_CODE,SECURITY_NAME_ABBR,NOTICE_DATE,REPORTDATE,PARENT_NETPROFIT,BPS",
                  "filter": actual_filter,
                  "client": "WEB" 
              }
              
              max_retries = 3
              for attempt in range(max_retries):
                  try:
                      res = requests.get(url, params=params, headers=HEADERS, timeout=8)
                      data = res.json()
                      if data and data.get("result") and data["result"].get("data"):
                          return pure_code, name, data["result"]["data"], None
                      
                      code = data.get('code')
                      if code == 911 or "无数据" in data.get('message', ''):
                          return pure_code, name, [], "NO_DATA"
                          
                      err_msg = f"API返回码: {code}, 消息: {data.get('message')}"
                      if attempt < max_retries - 1:
                          time.sleep(1.0 * (attempt + 1))
                          continue
                      return pure_code, name, [], err_msg
                  except Exception as e:
                      if attempt < max_retries - 1:
                          time.sleep(1.5 * (attempt + 1))
                          continue
                      return pure_code, name, [], str(e)

          def main():
              global WORKING_FILTER
              print("📋 读取 TDX 生成的股票列表...")
              try:
                  with open('stock_list_master.json', 'r', encoding='utf-8') as f:
                      master_list = json.load(f)
              except Exception as e:
                  print(f"❌ 读取 JSON 失败: {e}")
                  return

              valid_stocks = []
              for s in master_list:
                  code = s['code'].replace('.', '').lower()
                  if code.startswith('sh') and code[2:4] in ['60', '68']:
                      valid_stocks.append(s)
                  elif code.startswith('sz') and code[2:4] in ['00', '30']:
                      valid_stocks.append(s)
                  elif code.startswith('bj') and code[2:4] in ['43', '83', '87', '92']:
                      valid_stocks.append(s)

              total_stocks = len(valid_stocks)
              print(f"✅ 成功加载全市场待扫描 A股：{total_stocks} 只")
              
              sample_item = random.choice(valid_stocks)
              sample_pure = sample_item['code'].replace('.', '').lower()[2:]
              if not explore_sql_syntax(sample_pure, sample_item['code']):
                  print("❌ 报错：接口 SQL 语法验证失败！")
                  return
                  
              WORKING_FILTER = WORKING_FILTER.replace(sample_pure, "PROBE_CODE")
              print(f"🎯 统一 SQL 过滤器模板建立成功: {WORKING_FILTER}")
              print(f"🚀 开始并发扫描全市场 5200+ 只股票全量历史财报 (30 线程)...")
              
              all_flat_rows = []
              success_count = 0
              no_data_count = 0
              fail_count = 0
              
              with ThreadPoolExecutor(max_workers=30) as executor:
                  futures = {executor.submit(fetch_f10_datacenter_with_retry, s): s for s in valid_stocks}
                  for future in tqdm(as_completed(futures), total=total_stocks, desc="扫描历史财报"):
                      pure_code, name, data, err = future.result()
                      if data:
                          success_count += 1
                          for row in data:
                              all_flat_rows.append({
                                  "code": pure_code,
                                  "name": name,
                                  "report_date": row.get("REPORTDATE", "")[:10] if row.get("REPORTDATE") else "",
                                  "notice_date": row.get("NOTICE_DATE", "")[:10] if row.get("NOTICE_DATE") else "",
                                  "net_profit": float(row["PARENT_NETPROFIT"]) if row.get("PARENT_NETPROFIT") is not None else None,
                                  "bps": float(row["BPS"]) if row.get("BPS") is not None else None
                              })
                      elif err == "NO_DATA":
                          no_data_count += 1
                      else:
                          fail_count += 1
                          print(f"❌ 失败: {name}({pure_code}) - {err}")
                          
              print("\n" + "="*60)
              print(f"📊 接口拉取基础统计：")
              print(f"    - 总计尝试股票数: {total_stocks} 只")
              print(f"    - 成功拉取财报数: {success_count} 只")
              print(f"    - 无财报记录新股: {no_data_count} 只")
              print(f"    - 网络或系统失败: {fail_count} 只")
              print(f"    - 总计捕获财报行: {len(all_flat_rows):,} 行")
              print("="*60 + "\n")
              
              if all_flat_rows:
                  print("💾 正在使用 Polars 将全量历史基本面导出为 Parquet 归档...")
                  df = pl.DataFrame(all_flat_rows)
                  
                  # 数据清洗降维
                  df = df.with_columns([
                      pl.col("code").cast(pl.Utf8),
                      pl.col("name").cast(pl.Utf8),
                      pl.col("report_date").cast(pl.Utf8),
                      pl.col("notice_date").cast(pl.Utf8),
                      pl.col("net_profit").cast(pl.Float64),
                      pl.col("bps").cast(pl.Float64)
                  ]).sort(["code", "report_date"])
                  
                  os.makedirs("output", exist_ok=True)
                  out_path = "output/all_stocks_f10_raw.parquet"
                  df.write_parquet(out_path, compression="zstd")
                  print(f"✅ 归档文件物理落盘：{out_path} (大小: {os.path.getsize(out_path)/(1024*1024):.2f} MB)")
                  
                  # -------------------------------------------------------------
                  # 📈 深度数据统计审计模块 (Deep Data Audit)
                  # -------------------------------------------------------------
                  print("📊 正在执行深度数据审计与质量统计...")
                  pdf = df.to_pandas()
                  
                  # 1. 极值范围
                  min_rep, max_rep = pdf['report_date'].min(), pdf['report_date'].max()
                  min_not, max_not = pdf['notice_date'].min(), pdf['notice_date'].max()
                  
                  # 2. 缺失率扫描
                  null_profit = pdf['net_profit'].isnull().sum()
                  null_bps = pdf['bps'].isnull().sum()
                  pct_null_profit = (null_profit / len(pdf)) * 100
                  pct_null_bps = (null_bps / len(pdf)) * 100
                  
                  # 3. 报告期季节分布统计 (Q1, H1, Q3, FY)
                  pdf['md'] = pdf['report_date'].str[-5:]
                  q_dist = pdf['md'].value_counts()
                  q_report_md = {
                      "03-31": "一季报 (Q1)",
                      "06-30": "半年报 (H1)",
                      "09-30": "三季报 (Q3)",
                      "12-31": "年报 (FY)"
                  }
                  
                  # 4. 每股财务历史记录长度统计
                  lens = pdf.groupby('code').size()
                  avg_len = lens.mean()
                  max_len = lens.max()
                  min_len = lens.min()
                  
                  # 5. 财报跨度 Top5
                  top5 = pdf.groupby(['code', 'name']).size().reset_index(name='count').sort_values('count', ascending=False).head(5)
                  
                  # 6. 披露时滞深度计算 (通知日 - 报告截止日)
                  pdf['dt_report'] = pd.to_datetime(pdf['report_date'], errors='coerce')
                  pdf['dt_notice'] = pd.to_datetime(pdf['notice_date'], errors='coerce')
                  delays = (pdf['dt_notice'] - pdf['dt_report']).dt.days
                  valid_delays = delays[delays >= 0].dropna()
                  avg_delay = valid_delays.mean() if not valid_delays.empty else 0
                  max_delay = valid_delays.max() if not valid_delays.empty else 0
                  
                  # 生成 Markdown 报告
                  md = []
                  md.append("# 📊 F10 全市场财务数据审计统计报告")
                  md.append(f"生成时间: `{time.strftime('%Y-%m-%d %H:%M:%S')}`\n")
                  
                  md.append("## 1. 基础吞吐量统计")
                  md.append(f"- **尝试获取股票数:** `{total_stocks}` 只")
                  md.append(f"- **成功拉取财报数:** `{success_count}` 只 (占比: `{success_count/total_stocks*100:.2f}%`)")
                  md.append(f"- **空记录新股数:** `{no_data_count}` 只")
                  md.append(f"- **拉取失败股数:** `{fail_count}` 只")
                  md.append(f"- **总计拉取财报行数:** `{len(pdf):,}` 行")
                  md.append(f"- **落盘 Parquet 大小:** `{os.path.getsize(out_path)/(1024*1024):.2f} MB`\n")
                  
                  md.append("## 2. 覆盖跨度与时间线")
                  md.append(f"- **报告期覆盖区间:** `{min_rep}` 至 `{max_rep}`")
                  md.append(f"- **披露日覆盖区间:** `{min_not}` 至 `{max_not}`")
                  md.append(f"- **平均每股历史季度数:** `{avg_len:.1f}` 个季度")
                  md.append(f"- **单股最长季度跨度:** `{max_len}` 个季度")
                  md.append(f"- **单股最短季度跨度:** `{min_len}` 个季度\n")
                  
                  md.append("## 3. 数据完整性 (缺失率)")
                  md.append(f"- **净利润缺失数:** `{null_profit:,}` 行 (缺失率: `{pct_null_profit:.3f}%`)")
                  md.append(f"- **每股净资产缺失数:** `{null_bps:,}` 行 (缺失率: `{pct_null_bps:.3f}%`)\n")
                  
                  md.append("## 4. 报告期季节分布")
                  md.append("| 季度报告期 | 匹配月日 | 记录行数 | 占比 |")
                  md.append("| :--- | :--- | :--- | :--- |")
                  for md_key, label in q_report_md.items():
                      cnt = q_dist.get(md_key, 0)
                      md.append(f"| {label} | `{md_key}` | `{cnt:,}` | `{cnt/len(pdf)*100:.2f}%` |")
                  md.append("")
                  
                  md.append("## 5. 披露时滞 (Reporting Delay)")
                  md.append(f"- **平均披露延迟:** `{avg_delay:.1f}` 天 (财报从截止到市场获知的平均天数)")
                  md.append(f"- **最长披露延迟:** `{max_delay:,}` 天 (部分历史ST/重组股补发财报)\n")
                  
                  md.append("## 6. 历史跨度 Top 5 股票")
                  md.append("| 股票代码 | 股票名称 | 捕获季度数 |")
                  md.append("| :--- | :--- | :--- |")
                  for _, row in top5.iterrows():
                      md.append(f"| `{row['code']}` | `{row['name']}` | `{row['count']}` |")
                  
                  report_md_str = "\n".join(md)
                  
                  # 写入文件并注入 Actions 总结
                  with open("output/f10_audit_summary.md", "w", encoding="utf-8") as f:
                      f.write(report_md_str)
                  
                  print("\n" + "="*60)
                  print("📊 审计摘要预览：")
                  print(f"    - 财报总记录数: {len(pdf):,}")
                  print(f"    - 平均披露延迟: {avg_delay:.1f} 天")
                  print(f"    - 净利润缺失率: {pct_null_profit:.3f}%")
                  print(f"    - 最长历史季度: {max_len} 个 (平安银行/华塑控股等)")
                  print("="*60 + "\n")
                  
          if __name__ == "__main__":
              main()
          EOF
          
          python test_f10_full.py
          
      - name: Publish Audit Summary to Actions Page
        if: always()
        run: |
          if [ -f output/f10_audit_summary.md ]; then
            cat output/f10_audit_summary.md >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Upload Stress Test Parquet & Summary
        uses: actions/upload-artifact@v4
        with:
          name: full-f10-raw-data-with-stats
          path: |
            output/all_stocks_f10_raw.parquet
            output/f10_audit_summary.md
          retention-days: 7

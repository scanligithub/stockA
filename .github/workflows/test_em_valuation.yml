name: Test Akshare Valuation

on:
  workflow_dispatch:

jobs:
  test-valuation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Dependencies
        run: |
          pip install akshare pandas numpy tabulate
          
      - name: Create Test Script
        run: |
          cat << 'EOF' > test_ak.py
          import akshare as ak
          import pandas as pd

          def test_fetch_valuation(code):
              print(f"\n🚀 开始测试 akshare 个股历史估值... 目标股票: {code}")
              try:
                  # stock_a_indicator_lg 接口：返回该股票上市以来的全部 PE/PB 序列
                  df = ak.stock_a_indicator_lg(symbol=code)
                  
                  if df.empty:
                      print("❌ 接口返回空 DataFrame")
                      return
                      
                  # 查看最后 10 天的数据
                  recent_df = df.tail(10)
                  print("✅ 成功获取！过去 10 天的历史估值数据：")
                  print(recent_df.to_markdown(index=False))
                  
                  # 校验是否有值
                  if recent_df['pe'].sum() > 0 and recent_df['pb'].sum() > 0:
                      print("\n🎉 结论：Akshare 估值接口稳定可行！")
                  else:
                      print("\n⚠️ 结论：虽然拿到了数据，但全是 0 或空值。")
                      
              except Exception as e:
                  print(f"❌ 请求崩溃: {e}")

          if __name__ == "__main__":
              # 测试平安银行 (此处代码格式需符合接口要求，通常是 6 位数字如 000001)
              test_fetch_valuation("000001")
              
              print("\n" + "="*50)
              
              # 测试贵州茅台
              test_fetch_valuation("600519")
          EOF
          
          python test_ak.py

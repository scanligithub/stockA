name: Test F10 Finance 100 Stocks

on:
  workflow_dispatch:

jobs:
  test-f10-finance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Dependencies
        run: |
          pip install requests pandas tqdm tabulate
          
      - name: Create F10 Stress Test Script
        run: |
          cat << 'EOF' > test_f10_100.py
          import requests
          import pandas as pd
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from tqdm import tqdm

          def get_100_test_stocks():
              """从东财获取 100 只真实的 A 股代码作为测试样本"""
              print("🔍 正在获取 100 只真实 A 股代码...")
              url = "https://push2.eastmoney.com/api/qt/clist/get"
              params = {
                  "pn": 1, "pz": 100, "po": 1, "np": 1, 
                  "ut": "bd1d9ddb04089700cf9c27f6f7426281",
                  "fltt": 2, "invt": 2, "fid": "f3",
                  "fs": "m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23,m:0+t:81+s:2048",
                  "fields": "f12,f13,f14" # f12=code, f13=market, f14=name
              }
              res = requests.get(url, timeout=10).json()
              stocks = []
              for item in res['data']['diff']:
                  market = item['f13']
                  code = item['f12']
                  name = item['f14']
                  if market == 0: prefix = "SZ"
                  elif market == 1: prefix = "SH"
                  else: prefix = "BJ"
                  stocks.append((f"{prefix}{code}", name))
              return stocks

          def fetch_f10_history(stock_info):
              """拉取单只股票全历史财报 (按报告期)"""
              em_code, name = stock_info
              url = f"https://emweb.securities.eastmoney.com/PC_HSF10/NewFinanceAnalysis/ZYZBAjaxNew?type=1&code={em_code}"
              headers = {"User-Agent": "Mozilla/5.0"}
              
              try:
                  res = requests.get(url, headers=headers, timeout=10)
                  data = res.json()
                  if data and data.get("data"):
                      return em_code, name, data["data"], None
                  return em_code, name, [], "无数据返回"
              except Exception as e:
                  return em_code, name, [], str(e)

          def main():
              stocks = get_100_test_stocks()
              print(f"✅ 成功拿到 {len(stocks)} 只股票种子，开始 10 线程并发压测 F10 接口...")
              
              results = []
              success_count = 0
              fail_count = 0
              
              # 开启 10 线程温和压测
              with ThreadPoolExecutor(max_workers=10) as executor:
                  futures = {executor.submit(fetch_f10_history, s): s for s in stocks}
                  for future in tqdm(as_completed(futures), total=len(stocks), desc="拉取财报"):
                      em_code, name, data, err = future.result()
                      if data:
                          success_count += 1
                          results.append({"code": em_code, "name": name, "history_len": len(data), "raw_data": data})
                      else:
                          fail_count += 1
                          print(f"❌ 失败: {em_code} - {err}")
                          
              print("\n" + "="*60)
              print(f"📊 压测统计：总计 {len(stocks)}只 | 成功 {success_count}只 | 失败 {fail_count}只")
              
              if success_count > 0:
                  # 找一只历史数据最长的股票看看底牌
                  longest_stock = max(results, key=lambda x: x['history_len'])
                  print(f"\n🏆 历史财报最长的股票是: {longest_stock['name']} ({longest_stock['code']})，共拿到 {longest_stock['history_len']} 个季度的财报！")
                  
                  # 打印它的字典 Keys，精准确认字段名
                  sample_row = longest_stock['raw_data'][0]
                  print("\n🔑 F10 API 底层全量字段 Keys 大起底：")
                  print(", ".join(sample_row.keys()))
                  
                  # 转化为 DataFrame，提取我们关心的核心列
                  df = pd.DataFrame(longest_stock['raw_data'])
                  
                  # 提取：REPORT_DATE(报告期), UPDATE_DATE(实际更新/披露日), PARENTNETPROFIT(归母净利润), BPS(每股净资产)
                  target_cols = ['REPORT_DATE', 'UPDATE_DATE', 'PARENTNETPROFIT', 'BPS']
                  available_cols = [c for c in target_cols if c in df.columns]
                  
                  print(f"\n🌟 核心提取字段展示 ({longest_stock['name']} 过去 5 个季度)：")
                  print(df[available_cols].head(5).to_markdown(index=False))
                  
                  print(f"\n🌟 核心提取字段展示 ({longest_stock['name']} 最远古的 5 个季度)：")
                  print(df[available_cols].tail(5).to_markdown(index=False))
                  
              print("\n🎉 结论推演：如果成功率 > 95%，且 PARENTNETPROFIT 有真实数值，本方案即为绝对最优解！")

          if __name__ == "__main__":
              main()
          EOF
          
          python test_f10_100.py

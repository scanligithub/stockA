# FILE: .github/workflows/extract_top500_products.yml
name: Extract Top 500 Main Products (产业链提纯)

on:
  workflow_dispatch: # 支持在 GitHub Actions 页面手动点击触发

permissions:
  contents: read

jobs:
  extract-products:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: ⚙️ Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy
          
      - name: 📡 Build Go Engine & Fetch Master List
        run: |
          go build -o tdx_fetcher scripts/tdx_fetcher.go
          ./tdx_fetcher -mode=list
          ls -lh stock_list_master.json
          
      - name: ❄️ Fetch Xueqiu Main Business Data
        env:
          XQ_A_TOKEN: ${{ secrets.XQ_A_TOKEN }}
        run: |
          python scripts/fetch_f10_mainbus.py
          
      - name: 🧮 Extract Top 500 Products to CSV
        run: |
          python scripts/extract_top500_products.py
          
      - name: 📤 Upload Top 500 CSV Artifact
        uses: actions/upload-artifact@v4
        with:
          name: top500-products-dictionary
          path: output/top500_main_products.csv
          retention-days: 7

name: 🕵️ 验证成分股伪装抓取 (Constituent Disguise)

on:
  workflow_dispatch: # 手动触发

jobs:
  disguise-test:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 🚀 执行成分股伪装测试
        env:
          # 确保您的 GitHub Secrets 中配置了 CF_WORKER_URL
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: python scripts/test_constituent_disguise.py

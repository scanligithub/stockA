name: Sync Release to HF (Zero History Mode)

on:
  workflow_dispatch:
    inputs:
      file_pattern:
        description: 'Pattern (e.g. *)'
        default: '*'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p hf_sync_dir
          gh release download archive -D hf_sync_dir --pattern "${{ inputs.file_pattern }}" || echo "⚠️ No files found"
          
      - name: Push to HF (Force Overwrite)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          # 确保 README 配置被带入
          cp README.md hf_sync_dir/ 2>/dev/null || echo "README not found"
          
          cd hf_sync_dir
          git init -b main
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git lfs install
          git lfs track "*.parquet"
          git add .gitattributes
          git add .
          git commit -m "Full Sync from Release: $(date +'%Y-%m-%d %H:%M:%S')"
          git push https://user:$HF_TOKEN@huggingface.co/datasets/$HF_REPO main --force

name: Sync Release to HF
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      file_pattern:
        description: 'Pattern (e.g. *)'
        default: '*'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install huggingface_hub
      
      - name: Download from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir downloads
          # 下载符合 pattern 的文件到 downloads 目录
          gh release download archive -D downloads --pattern "${{ inputs.file_pattern }}" || echo "⚠️ No files found or Release missing"
          
      - name: Upload to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          import glob
          
          # 1. 获取所有下载的文件
          files = glob.glob('downloads/*')
          print(f'📂 Found {len(files)} files in downloads folder.')
          
          if len(files) == 0:
              print('⚠️ No files found to upload. Please check if the Release exists and contains files.')
              exit(0) # 优雅退出
          
          api = HfApi(token=os.getenv('HF_TOKEN'))
          repo = os.getenv('HF_REPO')
          
          print(f'🎯 Target Repo: {repo}')
          
          for f in files:
              if os.path.isfile(f):
                  fname = os.path.basename(f)
                  print(f'🚀 Uploading {fname} ...')
                  try:
                      api.upload_file(
                          path_or_fileobj=f, 
                          path_in_repo=fname, 
                          repo_id=repo, 
                          repo_type='dataset'
                      )
                      print(f'✅ {fname} success.')
                  except Exception as e:
                      print(f'❌ Failed to upload {fname}: {e}')
                      # 不退出，继续传下一个
          "

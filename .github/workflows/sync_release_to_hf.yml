name: Sync Release to HF (Zero History Mode)

on:
  workflow_dispatch:
    inputs:
      file_pattern:
        description: 'Pattern (e.g. *)'
        default: '*'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取全部历史，方便后续操作

      - name: Download from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p hf_sync_dir
          # 下载文件到专用目录
          gh release download archive -D hf_sync_dir --pattern "${{ inputs.file_pattern }}" || echo "⚠️ No files found"
          
      - name: Merge & Push to HF (Force Overwrite)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          # 1. 运行合并脚本（生成最终数据到 output/）
          python scripts/merge_and_push.py --mode release
          
          # 2. 进入输出目录
          cd output
          
          # 3. 初始化全新的 Git 环境（抹除历史）
          git init -b main
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # 4. 启用 LFS 并追踪 parquet 文件
          git lfs install
          git lfs track "*.parquet"
          git add .gitattributes
          
          # 5. 提交当前最新数据
          git add .
          git commit -m "Daily data refresh: $(date +'%Y-%m-%d %H:%M:%S')"
          
          # 6. 强制覆盖 HF 远程仓库（只保留最新版本）
          git push https://user:$HF_TOKEN@huggingface.co/datasets/$HF_REPO main --force
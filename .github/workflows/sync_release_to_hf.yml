name: Sync Release to HF (Zero History Mode)

on:
  workflow_dispatch:
    inputs:
      file_pattern:
        description: 'Pattern (e.g. *)'
        default: '*'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取全部历史，方便后续操作

      - name: Download from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p hf_sync_dir
          # 下载文件到专用目录
          gh release download archive -D hf_sync_dir --pattern "${{ inputs.file_pattern }}" || echo "⚠️ No files found"
          
      - name: Push to Hugging Face (Force Overwrite)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }} # 格式如: username/dataset-name
        run: |
          cd hf_sync_dir
          
          # 1. 初始化全新的 Git 环境
          git init -b main
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # 2. 启用 LFS 并追踪所有下载的文件
          git lfs install
          # 追踪所有文件（既然是数据集，通常所有大文件都需要 LFS）
          git lfs track "*"
          git add .gitattributes
          
          # 3. 添加文件并创建唯一的 Commit
          git add .
          git commit -m "Auto-sync from GitHub Release: $(date +'%Y-%m-%d %H:%M:%S')"
          
          # 4. 强制推送到 HF 远程仓库
          # 注意：这将抹除远程仓库的所有历史记录，仅保留当前内容
          git push https://user:$HF_TOKEN@huggingface.co/datasets/$HF_REPO main --force
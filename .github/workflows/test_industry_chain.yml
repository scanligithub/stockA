name: Test Industry Chain API

on:
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip' # 使用 pip 缓存加速依赖安装

      - name: Install Quant Dependencies
        run: |
          pip install --upgrade pip
          pip install akshare pandas

      - name: Test AkShare Mobile API
        run: python tests/test_akshare_zygc.py

name: Test Industry Chain API

on:
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Test Dependencies
        run: pip install requests

      - name: Test Real HSF10 API
        run: python tests/test_f10_mainbus.py

      - name: Test Sniff Macro Chain
        run: python tests/test_industry_center.py

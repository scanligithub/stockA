name: Test Industry Chain API

on:
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Test Dependencies
        run: pip install requests

      - name: Probe Correct Table Names
        run: python tests/probe_tables.py

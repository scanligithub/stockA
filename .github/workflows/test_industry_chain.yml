name: Test Industry Chain API

on:
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Quant Dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas pyarrow lxml html5lib

      - name: Test Sina HTML Parser
        run: python tests/test_sina_mainbus.py

name: Test Xueqiu F10 Connection

on:
  workflow_dispatch:

jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Test Dependencies
        run: pip install polars requests pyarrow

      - name: Run Xueqiu F10 Space Test
        env:
          XQ_A_TOKEN: ${{ secrets.XQ_A_TOKEN }} # 🛡️ 安全注入秘钥
        run: python scripts/test_xueqiu_mainbus.py

      - name: Upload Test Output to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xueqiu-mainbus-test-data
          path: output_test/*.parquet
          retention-days: 3

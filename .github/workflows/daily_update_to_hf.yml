name: Daily Update to HF (Matrix)

on:
  schedule:
    - cron: '0 17 * * *' # 北京时间凌晨 01:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install baostock pandas
      - id: set-matrix
        run: |
          python scripts/prepare_matrix.py
          echo "matrix=$(cat stock_matrix.json)" >> $GITHUB_OUTPUT

  fetch-stocks:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Fetch Current Year Data
        run: |
          python scripts/fetch_worker.py --index ${{ matrix.task.index }} --codes '${{ toJson(matrix.task.codes) }}'
      - uses: actions/upload-artifact@v4
        with:
          name: daily-parts-${{ matrix.task.index }}
          path: temp_parts/*.parquet
          retention-days: 1

  fetch-sectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Fetch Sectors
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: python scripts/fetch_sector.py
      - uses: actions/upload-artifact@v4
        with:
          name: sector-parts
          path: temp_parts/*.parquet
          retention-days: 1

  finalize:
    needs: [fetch-stocks, fetch-sectors]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: all_artifacts
          
      - name: Merge Data (Local Only)
        run: |
          # 使用 --mode release 仅在本地生成合并后的文件到 output/
          python scripts/merge_and_push.py --mode release
          
      - name: Force Push to HF (Zero History)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          # 1. 核心：将 README 拷贝到输出目录，确保配置生效
          cp README.md output/ 2>/dev/null || echo "README not found"
          
          cd output
          # 2. 初始化全新仓库，抹除 Git 历史
          git init -b main
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # 3. 启用 LFS
          git lfs install
          git lfs track "*.parquet"
          git add .gitattributes
          
          # 4. 强制推送
          git add .
          git commit -m "Daily update (Zero History): $(date +'%Y-%m-%d %H:%M:%S')"
          git push https://user:$HF_TOKEN@huggingface.co/datasets/$HF_REPO main --force

      - name: Upload QC Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-qc-report
          path: output/qc_*
          retention-days: 3
      - name: Publish QC
        if: always()
        run: cat qc_summary.md >> $GITHUB_STEP_SUMMARY

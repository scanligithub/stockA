name: Daily Update to HF (Matrix)

on:
  schedule:
    - cron: '0 17 * * *' # 北京时间凌晨 01:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install baostock pandas aiohttp polars
      - id: set-matrix
        run: |
          python scripts/prepare_matrix.py
          echo "matrix=$(cat stock_matrix.json)" >> $GITHUB_OUTPUT

  fetch-stocks:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Fetch Current Year Data
        run: |
          python scripts/fetch_worker.py --index ${{ matrix.task.index }} --codes '${{ toJson(matrix.task.codes) }}'
      - uses: actions/upload-artifact@v4
        with:
          name: daily-parts-${{ matrix.task.index }}
          path: temp_parts/*.parquet
          retention-days: 1

  fetch-sectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Fetch Sectors
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: python scripts/fetch_sector.py
      - uses: actions/upload-artifact@v4
        with:
          name: sector-parts
          path: temp_parts/*.parquet
          retention-days: 1

  finalize:
    needs: [fetch-stocks, fetch-sectors]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: all_artifacts
          
      - name: Merge Data (Local Only)
        run: |
          # 使用 --mode release 仅在本地生成合并后的文件到 output/
          python scripts/merge_and_push.py --mode release
          
      - name: Force Push to HF (Clone & Merge Mode)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          # 1. 启用 LFS 并浅克隆当前的 HF 仓库（获取所有现有文件）
          git lfs install
          git clone --depth 1 https://user:$HF_TOKEN@huggingface.co/datasets/$HF_REPO hf_workspace
          
          # 2. 斩断 Git 历史（核心：防止产生版本历史）
          rm -rf hf_workspace/.git
          
          # 3. 将今天新生成的数据（在 output 目录下）以及 README 覆盖进工作区
          cp -a output/. hf_workspace/
          cp README.md hf_workspace/ 2>/dev/null || echo "README not found"
          
          # 4. 在合并后的目录中重新初始化，并强制推送
          cd hf_workspace
          git init -b main
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          git lfs track "*.parquet"
          git add .gitattributes
          git add .
          git commit -m "Daily Merge & Update (Zero History): $(date +'%Y-%m-%d %H:%M:%S')"
          git push https://user:$HF_TOKEN@huggingface.co/datasets/$HF_REPO main --force
      - name: Upload QC Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-qc-report
          path: output/qc_*
          retention-days: 3
      - name: Publish QC
        if: always()
        run: cat output/qc_summary.md >> $GITHUB_STEP_SUMMARY

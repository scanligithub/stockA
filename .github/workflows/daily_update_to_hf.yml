name: Daily Update to HF (Matrix)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 17 * * *' # 北京时间凌晨 01:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # 1. 准备阶段：预抓取股票矩阵和板块名册 (静默环境，无并发竞争)
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install baostock pandas requests urllib3
      - id: set-matrix
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: |
          python scripts/prepare_matrix.py
          echo "matrix=$(cat stock_matrix.json)" >> $GITHUB_OUTPUT
      - name: Upload Pre-fetched Lists
        uses: actions/upload-artifact@v4
        with:
          name: pre-fetched-lists
          path: sector_list.json
          retention-days: 1

  # 2. 并发下载股票行情 (19路分布式)
  fetch-stocks:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Fetch Current Year Stock Data
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: |
          python scripts/fetch_worker.py \
            --index ${{ matrix.task.index }} \
            --codes '${{ toJson(matrix.task.codes) }}'
      - name: Upload Part Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-stock-part-${{ matrix.task.index }}
          path: temp_parts/*.parquet
          retention-days: 1

  # 3. 下载板块行情 (基于 Prepare 阶段抓到的名册)
  fetch-sectors:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Pre-fetched Lists
        uses: actions/download-artifact@v4
        with:
          name: pre-fetched-lists
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Fetch Sectors
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: python scripts/fetch_sector.py
      - uses: actions/upload-artifact@v4
        with:
          name: sector-parts
          path: temp_parts/*.parquet
          retention-days: 1

  # 4. 汇总、质检、推送
  finalize:
    needs: [fetch-stocks, fetch-sectors]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: all_artifacts
      - name: Merge & Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: python scripts/merge_and_push.py --mode hf
      - name: Publish Summary
        if: always()
        run: cat output/qc_summary.md >> $GITHUB_STEP_SUMMARY

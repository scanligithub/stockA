name: Daily Update to Hugging Face

on:
  repository_dispatch:
    types: [daily_update]       
  workflow_dispatch:             

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 🌐 Download Official GBBQ zip (HTTP Mode)
        run: |
          set -euxo pipefail
          URL="http://www.tdx.com.cn/products/data/data/dbf/gbbq.zip"
          curl -L \
               --retry 3 \
               --retry-delay 5 \
               --connect-timeout 30 \
               -o gbbq.zip \
               "${URL}"
          unzip -o gbbq.zip
          mv gbbq gbbq.dat
          ls -lh gbbq.dat

      - name: Install Python GBBQ Decryptor Deps
        run: pip install pytdx pandas

      - name: Run Python GBBQ Decoder (1 second)
        run: |
          python scripts/parse_gbbq.py gbbq.dat gbbq_clean.csv
          ls -lh gbbq_clean.csv

      - name: Initialize Go Module
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy
          
      - id: set-matrix
        name: Build Engine & Generate Matrix
        run: |
          go build -o tdx_fetcher scripts/tdx_fetcher.go
          python scripts/prepare_matrix.py
          echo "matrix=$(cat stock_matrix.json)" >> $GITHUB_OUTPUT
          
      - name: Upload Master Metadata (List & GBBQ)
        uses: actions/upload-artifact@v4
        with:
          name: master-metadata
          path: |
            stock_list_master.json
            gbbq_clean.csv
          retention-days: 1

  fetch-daily-data:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Download Master Metadata
        uses: actions/download-artifact@v4
        with:
          name: master-metadata
          path: .
          
      - name: Install Python & Go Dependencies
        run: |
          pip install -r requirements.txt
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy
          
      - name: Build TDX Go Engine
        run: go build -o tdx_fetcher scripts/tdx_fetcher.go
      
      - name: Fetch Current Year Daily Data (Local gbbq_clean.csv + Sina Flow)
        run: |
          python scripts/fetch_worker.py \
            --index ${{ matrix.task.index }} \
            --codes '${{ toJson(matrix.task.codes) }}' \
            --year 0 
            
      - uses: actions/upload-artifact@v4
        with:
          name: daily-part-${{ matrix.task.index }}
          path: temp_parts/*.parquet
          retention-days: 1

  fetch-sectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
          
      - name: Install Runtime Dependencies
        run: |
          pip install -r requirements.txt
          pip install polars pytdx pandas pyarrow

      - name: Download Latest Healed Sectors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo scanligithub/em-sector-auto-healer --pattern "Full_Sector_Klines.zip" --clobber

      - name: Transform JSON to Clean Parquet
        run: python scripts/import_healed_sectors.py

      - name: 📈 Fetch Daily Incremental Index Data (HTTP API Fallback)
        run: |
          python -c '
          import os
          import requests
          import pandas as pd
          
          # 创建输出目录
          os.makedirs("temp_parts", exist_ok=True)
          
          # 定义需要拉取的指数及其对应的东财secid
          indexes = {
              "sh.000001": "1.000001",  # 上证指数
              "sz.399001": "0.399001",  # 深证成指
              "sz.399006": "0.399006",  # 创业板指
              "sh.000068": "1.000068",  # 科创50
              "bj.899050": "0.899050",  # 北证50
              "sh.000016": "1.000016",  # 上证50
              "sh.000300": "1.000300"   # 沪深300
          }
          
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          }
          
          for code, secid in indexes.items():
              try:
                  print(f"Pulling {code} via Eastmoney HTTP API...")
                  # 获取日K线数据，限制获取最近 1000 条以实现增量/历史覆盖
                  url = f"https://push2his.eastmoney.com/api/qt/stock/kline/get?secid={secid}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57&klt=101&fqt=1&end=20500101&lmt=1000"
                  res = requests.get(url, headers=headers, timeout=15)
                  res.raise_for_status()
                  
                  data = res.json()
                  klines = data.get("data", {}).get("klines", [])
                  if not klines:
                      print(f"⚠️ {code} 未返回有效数据")
                      continue
                      
                  records = []
                  for kl in klines:
                      p = kl.split(",")
                      # 对应东财返回字段: 日期,开盘,收盘,最高,最低,成交量(手),成交额
                      records.append({
                          "date": p[0],
                          "code": code,
                          "open": float(p[1]),
                          "close": float(p[2]),
                          "high": float(p[3]),
                          "low": float(p[4]),
                          "volume": float(p[5]),
                          "amount": float(p[6])
                      })
                      
                  df = pd.DataFrame(records)
                  output_path = f"temp_parts/index_{code}.parquet"
                  df.to_parquet(output_path, index=False)
                  print(f"✅ Successfully saved {code} ({len(df)} rows) -> {output_path}")
              except Exception as e:
                  print(f"❌ Failed to fetch {code}: {str(e)}")
          '

      - name: Upload Sector Parquet
        uses: actions/upload-artifact@v4
        with:
          name: sector-parts
          path: temp_parts/*.parquet
          retention-days: 1

  finalize:
    needs: [fetch-daily-data, fetch-sectors]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install Finalize Dependencies
        run: |
          pip install -r requirements.txt
          pip install polars baostock

      - name: Download Master List (For DuckDB Metadata)
        uses: actions/download-artifact@v4
        with:
          name: master-metadata
          path: .

      - name: Download All Data Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-part*'
          merge-multiple: true
          path: all_artifacts
          
      - name: 🌐 Sync All Stocks 37-Column F10 Financial Data
        run: |
          python scripts/fetch_f10_all.py
          ls -lh output/all_stocks_f10_raw.parquet

      - name: ❄️ Fetch All Stocks Full Historical Main Operating Business Detail
        env:
          XQ_A_TOKEN: ${{ secrets.XQ_A_TOKEN }}
        run: |
          python scripts/fetch_f10_mainbus.py
          ls -lh output/all_stocks_mainbus_raw.parquet

      - name: 💾 Restore Earnings Forecast Events from GitHub Cache
        uses: actions/cache/restore@v4
        id: restore-event-cache
        with:
          path: output/event_earnings_forecast.parquet
          key: event-forecast-cache-placeholder
          restore-keys: |
            event-forecast-cache-

      - name: 🛡️ Fallback if No Cache Exists
        run: |
          if [ ! -f output/event_earnings_forecast.parquet ]; then
            echo "⚠️ 未在本地磁盘检测到历史事件文件，启动全新仓库自动初始化..."
            mkdir -p output
            python -c "
            import polars as pl
            schema = {
                'code': pl.Utf8, 'notice_date': pl.Utf8, 'report_date': pl.Utf8,
                'forecast_type': pl.Utf8, 'forecast_yoy_mid': pl.Float64, 'summary': pl.Utf8
            }
            pl.DataFrame([], schema=schema).write_parquet('output/event_earnings_forecast.parquet')
            "
          else
            echo "✅ 物理检测通过：已成功加载 Actions 缓存恢复的历史事件数据（大小：$(ls -lh output/event_earnings_forecast.parquet | awk '{print $5}')）。"
          fi

      - name: Merge & Split by Year (HF Mode)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          python scripts/merge_and_push.py --mode hf --year 0
          
      - name: Publish Consolidated Summaries to Workflow Page
        if: always()
        run: |
          if [ -f output/f10_audit_summary.md ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            cat output/f10_audit_summary.md >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/mainbus_audit_summary.md ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            cat output/mainbus_audit_summary.md >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/qc_summary.md ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            cat output/qc_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload QC & Audit Reports to Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-qc-and-audit-reports
          path: |
            output/qc_report.json
            output/qc_summary.md
            output/f10_audit_summary.md
            output/mainbus_audit_summary.md
          retention-days: 7

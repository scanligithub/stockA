name: Verify TDX Transaction Data

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Create Scripts Directory
        run: mkdir -p scripts

      - name: 📝 Dynamically Write Introspection Script (verify_transaction.go)
        run: |
          cat << 'EOF' > scripts/verify_transaction.go
          package main

          import (
          	"encoding/json"
          	"fmt"
          	"os"
          	"reflect"
          	"strconv"
          	"strings"
          	"time"

          	"github.com/injoyai/tdx"
          )

          func getRecentTradingDay() int {
          	now := time.Now()
          	if now.Weekday() == time.Saturday {
          		now = now.AddDate(0, 0, -1)
          	} else if now.Weekday() == time.Sunday {
          		now = now.AddDate(0, 0, -2)
          	} else if now.Hour() < 15 {
          		now = now.AddDate(0, 0, -1)
          		if now.Weekday() == time.Saturday {
          			now = now.AddDate(0, 0, -1)
          		} else if now.Weekday() == time.Sunday {
          			now = now.AddDate(0, 0, -2)
          		}
          	}
          	val, _ := strconv.Atoi(now.Format("20060102"))
          	return val
          }

          func dumpTypeFields(t reflect.Type, indent string) {
          	if t.Kind() == reflect.Ptr {
          		t = t.Elem()
          	}
          	if t.Kind() == reflect.Slice || t.Kind() == reflect.Array {
          		fmt.Printf("%s[ ]集合成员类型:\n", indent)
          		dumpTypeFields(t.Elem(), indent+"  ")
          		return
          	}
          	if t.Kind() != reflect.Struct {
          		fmt.Printf("%s%s\n", indent, t.String())
          		return
          	}
          	
          	fmt.Printf("%s结构体定义: %s {\n", indent, t.String())
          	for i := 0; i < t.NumField(); i++ {
          		f := t.Field(i)
          		if f.PkgPath != "" {
          			continue
          		}
          		jsonTag := f.Tag.Get("json")
          		if jsonTag == "" {
          			jsonTag = "-"
          		}
          		fmt.Printf("%s  %-15s %-12s (json: %q)\n", indent, f.Name, f.Type.String(), jsonTag)
          		
          		ft := f.Type
          		if ft.Kind() == reflect.Ptr {
          			ft = ft.Elem()
          		}
          		if ft.Kind() == reflect.Struct && !strings.HasPrefix(ft.String(), "time.Time") {
          			dumpTypeFields(ft, indent+"    ")
          		}
          	}
          	fmt.Printf("%s}\n", indent)
          }

          func main() {
          	fmt.Println("============ 📡 TDX 分笔成交 (Trade) 接口类型自省引擎 ============")
          	fmt.Println("正在连接通达信行情服务器...")

          	cli, err := tdx.DialDefault()
          	if err != nil {
          		fmt.Printf("❌ 连接失败: %v\n", err)
          		os.Exit(1)
          	}
          	defer cli.Close()
          	fmt.Println("✅ 成功建立连接。")

          	val := reflect.ValueOf(cli)
          	typ := val.Type()

          	targetMethods := []string{"GetTrade", "GetTradeAll"}
          	for i := 0; i < typ.NumMethod(); i++ {
          		m := typ.Method(i)
          		nameLower := strings.ToLower(m.Name)
          		if strings.Contains(nameLower, "trade") && !strings.HasPrefix(m.Name, "Ex") && m.Name != "GetTrade" && m.Name != "GetTradeAll" {
          			targetMethods = append(targetMethods, m.Name)
          		}
          	}

          	tradingDay := getRecentTradingDay()
          	fmt.Printf("📅 自动推导测试交易日: %d\n", tradingDay)

          	for _, methodName := range targetMethods {
          		mVal := val.MethodByName(methodName)
          		if !mVal.IsValid() {
          			continue
          		}

          		fmt.Printf("\n⚡ 正在探测方法 [%s]...\n", methodName)
          		mType := mVal.Type()
          		numIn := mType.NumIn()

          		stringCount := 0
          		for idx := 0; idx < numIn; idx++ {
          			if mType.In(idx).Kind() == reflect.String {
          				stringCount++
          			}
          		}

          		args := make([]reflect.Value, numIn)
          		strIdx := 0
          		for i := 0; i < numIn; i++ {
          			argType := mType.In(i)
          			switch argType.Kind() {
          			case reflect.String:
          				if stringCount >= 2 {
          					if strIdx == 0 {
          						args[i] = reflect.ValueOf(strconv.Itoa(tradingDay))
          					} else {
          						args[i] = reflect.ValueOf("SZ000001")
          					}
          				} else {
          					args[i] = reflect.ValueOf("SZ000001")
          				}
          				strIdx++
          			case reflect.Uint32:
          				args[i] = reflect.ValueOf(uint32(tradingDay))
          			case reflect.Int32:
          				args[i] = reflect.ValueOf(int32(tradingDay))
          			case reflect.Int:
          				args[i] = reflect.ValueOf(tradingDay)
          			case reflect.Uint16:
          				if i == 1 {
          					args[i] = reflect.ValueOf(uint16(0))
          				} else {
          					args[i] = reflect.ValueOf(uint16(30))
          				}
          			default:
          				args[i] = reflect.Zero(argType)
          			}
          		}

          		err := callAndDump(methodName, mVal, args)
          		if err != nil {
          			fmt.Printf("   ⚠️ 调用执行未成功: %v\n", err)
          		}
          	}
          }

          func callAndDump(methodName string, mVal reflect.Value, args []reflect.Value) (err error) {
          	defer func() {
          		if r := recover(); r != nil {
          			err = fmt.Errorf("触发 Panic 保护: %v", r)
          		}
          	}()

          	results := mVal.Call(args)
          	if len(results) == 0 {
          		return fmt.Errorf("无返回值")
          	}

          	for _, res := range results {
          		if res.Type().Implements(reflect.TypeOf((*error)(nil)).Elem()) {
          			if !res.IsNil() {
          				return fmt.Errorf("API 级返回错误: %v", res.Interface())
          			}
          			continue
          		}

          		if res.Kind() == reflect.Ptr {
          			if res.IsNil() {
          				fmt.Printf("   📝 返回空指针类型: %s\n", res.Type())
          				continue
          			}
          			res = res.Elem()
          		}

          		if res.IsValid() {
          			resType := res.Type()
          			fmt.Printf("   🧬 检测到返回类型: %s\n", resType.String())
          			fmt.Println("   📋 [类型自省] 物理字段结构如下:")
          			dumpTypeFields(resType, "      ")

          			isSlice := res.Kind() == reflect.Slice
          			isStruct := res.Kind() == reflect.Struct

          			if isSlice || isStruct {
          				if isSlice && res.Len() == 0 {
          					fmt.Println("   📝 [当前值] 空数据集 (当前非交易时段或无成交数据)。")
          					return nil
          				}

          				jsonData, jsonErr := json.MarshalIndent(res.Interface(), "", "  ")
          				if jsonErr == nil {
          					fmt.Println("   📥 [当前值] 成功捕获实体数据:")
          					lines := strings.Split(string(jsonData), "\n")
          					limit := 40
          					if len(lines) < limit {
          						limit = len(lines)
          					}
          					fmt.Println(strings.Join(lines[:limit], "\n"))
          					if len(lines) > limit {
          						fmt.Println("      ... (后文已省略)")
          					}

          					filename := fmt.Sprintf("structure_%s.json", methodName)
          					_ = os.WriteFile(filename, jsonData, 0644)
          					fmt.Printf("   💾 实体数据已保存到: %s\n", filename)
          					return nil
          				}
          			}
          		}
          	}
          	return nil
          }
          EOF

      - name: 📝 Dynamically Write Test Script (test_fetch_trades.go)
        run: |
          cat << 'EOF' > scripts/test_fetch_trades.go
          package main

          import (
          	"fmt"
          	"net/http"
          	"os"
          	"strconv"
          	"strings"
          	"time"

          	"github.com/injoyai/tdx"
          )

          func getTrueBeijingTime() time.Time {
          	client := &http.Client{Timeout: 3 * time.Second}
          	resp, err := client.Head("https://www.baidu.com")
          	if err == nil && resp.Header.Get("Date") != "" {
          		t, err := time.Parse(time.RFC1123, resp.Header.Get("Date"))
          		if err == nil {
          			return t.In(time.FixedZone("CST", 8*3600))
          		}
          	}
          	fmt.Println("⚠️ 无法获取网络时间，降级使用系统本地时钟。")
          	return time.Now()
          }

          func getRecentTradingDays(targetTime time.Time, n int) []int {
          	var days []int
          	curr := targetTime

          	if curr.Hour() < 15 {
          		curr = curr.AddDate(0, 0, -1)
          	}

          	for len(days) < n {
          		if curr.Weekday() != time.Saturday && curr.Weekday() != time.Sunday {
          			val, _ := strconv.Atoi(curr.Format("20060102"))
          			days = append(days, val)
          		}
          		curr = curr.AddDate(0, 0, -1)
          	}
          	return days
          }

          func main() {
          	fmt.Println("============ 📊 TDX 多股多日分笔成交实测引擎 ============")
          	
          	trueTime := getTrueBeijingTime()
          	recentDays := getRecentTradingDays(trueTime, 1)
          	
          	if len(recentDays) > 0 && recentDays[0] > 20250000 {
          		fmt.Println("⚠️ 提示: 检测到本地环境时钟处于未来，自动并入真实世界历史交易日 [20241220 20241219] 以获取真实物理 Tick...")
          		recentDays = append(recentDays, 20241220, 20241219)
          	}

          	fmt.Printf("⏰ 运行基准时间: %s\n", trueTime.Format("2006-01-02 15:04:05"))
          	fmt.Printf("📅 待拉取的交易日清单: %v\n", recentDays)

          	cli, err := tdx.DialDefault()
          	if err != nil {
          		fmt.Printf("❌ 建立服务器连接失败: %v\n", err)
          		os.Exit(1)
          	}
          	defer cli.Close()
          	fmt.Println("✅ 成功连接通达信行情服务。")

          	testStocks := []struct {
          		Code string
          		Name string
          	}{
          		{"sh600519", "贵州茅台"},
          		{"sz000001", "平安银行"},
          		{"sz300750", "宁德时代"},
          	}

          	for _, stock := range testStocks {
          		fmt.Printf("\n==================== 📈 股票: %s (%s) ====================\n", stock.Name, stock.Code)
          		
          		for _, dateInt := range recentDays {
          			fmt.Printf("🔎 正在提取 %d 的分笔成交数据...\n", dateInt)
          			
          			upperCode := strings.ToUpper(stock.Code)
          			pureCode := upperCode[2:]
          			dateStr := strconv.Itoa(dateInt)
          			
          			resp, err := cli.GetHistoryTrade(dateStr, upperCode, 0, 50)
          			if err != nil {
          				fmt.Printf("   ❌ 获取失败: %v\n", err)
          				continue
          			}

          			if resp == nil || len(resp.List) == 0 {
          				resp, err = cli.GetHistoryTrade(dateStr, pureCode, 0, 50)
          				if err != nil || resp == nil || len(resp.List) == 0 {
          					fmt.Println("   ⚠️ 该交易日无分笔数据（或当天未上市/停牌）。")
          					continue
          				}
          			}

          			fmt.Printf("   ✅ 成功捕获分笔。当天总笔数(片区): %d, 提取样本数: %d\n", resp.Count, len(resp.List))
          			
          			limit := 5
          			if len(resp.List) < limit {
          				limit = len(resp.List)
          			}
          			
          			fmt.Println("   📝 前 5 条交易明细:")
          			fmt.Printf("      %-10s | %-10s | %-10s | %-10s | %-10s\n", "时间", "成交价", "成交量(手)", "笔数/单号", "方向")
          			fmt.Println("      " + strings.Repeat("-", 65))
          			
          			for i := 0; i < limit; i++ {
          				t := resp.List[i]
          				timeStr := t.Time.Format("15:04:05")
          				if timeStr == "00:00:00" {
          					timeStr = t.Time.String()
          				}
          				
          				dirStr := "中性"
          				if t.Status == 0 {
          					dirStr = "🔴 主买"
          				} else if t.Status == 1 {
          					dirStr = "🟢 主卖"
          				}
          				
          				fmt.Printf("      %-10s | %-10v | %-10d | %-10d | %-10s\n", 
          					timeStr, 
          					t.Price, 
          					t.Volume, 
          					t.Number, 
          					dirStr,
          				)
          			}
          		}
          	}
          	fmt.Println("\n=======================================================")
          	fmt.Println("🎉 实测任务结束。")
          }
          EOF

      - name: 📝 Dynamically Write History Depth Probe Script (test_history_boundary.go)
        run: |
          cat << 'EOF' > scripts/test_history_boundary.go
          package main

          import (
          	"fmt"
          	"os"

          	"github.com/injoyai/tdx"
          )

          type Checkpoint struct {
          	Label string
          	Date  string
          }

          func main() {
          	fmt.Println("============ 🧭 TDX 历史分笔深度探测引擎 ============")
          	
          	cli, err := tdx.DialDefault()
          	if err != nil {
          		fmt.Printf("❌ 连接服务器失败: %v\n", err)
          		os.Exit(1)
          	}
          	defer cli.Close()
          	fmt.Println("✅ 成功连接行情服务。")

          	// 定义测试回溯检查点 (已移出 time 包引用以通过 Go 编译器门禁)
          	checkpoints := []Checkpoint{
          		{"1 年前  (2024-01-15 星期一)", "20240115"},
          		{"2 年前  (2023-01-16 星期一)", "20230116"},
          		{"3 年前  (2022-01-14 星期五)", "20220114"},
          		{"4 年前  (2021-01-15 星期五)", "20210115"},
          		{"5 年前  (2020-01-15 星期三)", "20200115"},
          		{"6 年前  (2019-01-15 星期二)", "20190115"},
          		{"8 年前  (2017-01-16 星期一)", "20170116"},
          		{"10 年前 (2015-01-15 星期四)", "20150115"},
          		{"15 年前 (2010-01-15 星期五)", "20100115"},
          		{"20 年前 (2005-01-14 星期五)", "20050114"},
          	}

          	testStock := "SZ000001" // 平安银行 (1991年上市)
          	fmt.Printf("🎯 探测标的: %s\n\n", testStock)

          	for _, cp := range checkpoints {
          		fmt.Printf("🔎 正在尝试探测 [%s] 的成交分笔...\n", cp.Label)
          		
          		resp, err := cli.GetHistoryTrade(cp.Date, testStock, 0, 5)
          		if err != nil {
          			fmt.Printf("   ❌ 失败 (接口报错): %v\n", err)
          			continue
          		}

          		if resp == nil || len(resp.List) == 0 {
          			fmt.Println("   ⚠️ 空数据 (服务器无此历史缓存)")
          			continue
          		}

          		fmt.Printf("   🎉 成功！当天分笔总数(片区): %d | 获取样本首笔价格: %v 元 | 时间: %v\n", 
          			resp.Count, 
          			resp.List[0].Price, 
          			resp.List[0].Time.Format("15:04:05"),
          		)
          	}
          	fmt.Println("\n=======================================================")
          	fmt.Println("🎉 深度探测任务完成。")
          }
          EOF

      - name: Initialize and Install Dependencies
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy

      - name: Run Schema Introspection
        run: |
          go run scripts/verify_transaction.go > introspection_log.txt
          cat introspection_log.txt

      - name: Run Multi-Stock Multi-Day Live Test
        run: |
          go run scripts/test_fetch_trades.go > test_run_log.txt
          cat test_run_log.txt

      - name: Run History Depth Boundary Test
        run: |
          go run scripts/test_history_boundary.go > boundary_log.txt
          cat boundary_log.txt

      - name: Generate Summary Report
        if: always()
        run: |
          echo "## 📊 TDX Intraday Trade Data Quality & History Boundary Audit" > summary.md
          
          if [ -f boundary_log.txt ]; then
            echo "### 🧭 TDX Tick Data Historical Tracking Depth" >> summary.md
            echo "\`\`\`txt" >> summary.md
            cat boundary_log.txt >> summary.md
            echo "\`\`\`" >> summary.md
          fi

          if [ -f test_run_log.txt ]; then
            echo "### 📈 Multi-Stock Multi-Day Trade Test Console Logs" >> summary.md
            echo "\`\`\`txt" >> summary.md
            cat test_run_log.txt >> summary.md
            echo "\`\`\`" >> summary.md
          fi
          
          if [ -f introspection_log.txt ]; then
            echo "### 🖥️ API Type Introspection Metadata" >> summary.md
            echo "\`\`\`txt" >> summary.md
            cat introspection_log.txt | grep -E "结构体定义|检测到返回类型|集合成员类型|Price|Volume|Time|Status" -A 10 >> summary.md
            echo "\`\`\`" >> summary.md
          fi
          
          cat summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Verification Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tdx-trade-test-spec
          path: |
            *.txt
            structure_*.json
          retention-days: 7

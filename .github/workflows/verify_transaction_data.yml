name: Verify TDX Transaction Data

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Initialize and Install Dependencies
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy

      - name: Run Schema Introspection
        run: |
          go run scripts/verify_transaction.go > introspection_log.txt
          cat introspection_log.txt

      - name: Run Multi-Stock Multi-Day Live Test
        run: |
          go run scripts/test_fetch_trades.go > test_run_log.txt
          cat test_run_log.txt

      - name: Generate Summary Report
        if: always()
        run: |
          echo "## 📊 TDX Intraday Trade Data Quality Audit" > summary.md
          
          if [ -f test_run_log.txt ]; then
            echo "### 📈 Multi-Stock Multi-Day Trade Test Console Logs" >> summary.md
            echo "\`\`\`txt" >> summary.md
            cat test_run_log.txt >> summary.md
            echo "\`\`\`" >> summary.md
          fi
          
          if [ -f introspection_log.txt ]; then
            echo "### 🖥️ API Type Introspection Metadata" >> summary.md
            echo "\`\`\`txt" >> summary.md
            cat introspection_log.txt | grep -E "结构体定义|检测到返回类型|集合成员类型|Price|Volume|Time|Status" -A 10 >> summary.md
            echo "\`\`\`" >> summary.md
          fi
          
          cat summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Verification Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tdx-trade-test-spec
          path: |
            *.txt
            structure_*.json
          retention-days: 7

# FILE: .github/workflows/verify_transaction_data.yml
name: Verify TDX Transaction Data

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: 📦 Initialize and Install Dependencies
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy

      - name: 🚀 Run Verification Script
        run: |
          go run scripts/verify_transaction.go > output_log.txt
          cat output_log.txt

      - name: 📊 Generate Summary Report
        if: always()
        run: |
          echo "## 📊 TDX Trade Data Field Audit" > summary.md
          echo "### 🖥️ Run Logs" >> summary.md
          echo "\`\`\`txt" >> summary.md
          cat output_log.txt >> summary.md
          echo "\`\`\`" >> summary.md
          
          # 动态检索并追加生成的结构数据样本至 Step Summary
          for f in structure_*.json; do
            if [ -f "$f" ]; then
              echo "### 📦 File: $f" >> summary.md
              echo "\`\`\`json" >> summary.md
              cat "$f" | head -n 80 >> summary.md
              if [ $(cat "$f" | wc -l) -gt 80 ]; then
                echo -e "\n  ... (Remaining lines omitted inside summary. Please download artifacts for details)" >> summary.md
              fi
              echo "\`\`\`" >> summary.md
            fi
          done
          
          cat summary.md >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Verification Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tdx-trade-spec
          path: |
            output_log.txt
            structure_*.json
          retention-days: 7

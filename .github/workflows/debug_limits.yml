name: Debug API Limits in Action

on:
  workflow_dispatch: # 手动触发

jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Dependencies
        run: pip install requests
        
      - name: Execute Gradient Test
        run: python scripts/debug_api_limits.py

name: Fetch Full History to Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 🌐 Download Official GBBQ zip (HTTP Mode)
        run: |
          set -euxo pipefail
          URL="http://www.tdx.com.cn/products/data/data/dbf/gbbq.zip"
          curl -L --retry 3 -o gbbq.zip "${URL}"
          unzip -o gbbq.zip
          mv gbbq gbbq.dat

      - name: Initialize Go Module & Install Packages
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy

      # 🌟 关键修改：第一步先编译 Go 引擎并运行 -mode=list，通过 TCP 建立 100% 正确的 A 股本地名单
      - id: build-and-list
        name: Build TDX Go Engine & Fetch Master List
        run: |
          go build -o tdx_fetcher scripts/tdx_fetcher.go
          ./tdx_fetcher -mode=list

      # 🌟 关键修改：第二步直接让 Python 读取本地 stock_list_master.json 并发拉取 F10 (0 网络种子开销)
      - name: 🧠 Pre-Calculate Finance Matrix via EastMoney F10 API
        run: |
          pip install requests pandas pyarrow numpy tqdm
          python scripts/build_finance_master.py

      # 🌟 第三步切割矩阵分片
      - id: set-matrix
        name: Generate Parallel Chunks Matrix
        run: |
          python scripts/prepare_matrix.py
          echo "matrix=$(cat stock_matrix.json)" >> $GITHUB_OUTPUT
          
      # 🌟 将烘焙好的 finance_master.parquet 与 metadata 一同上链分发
      - name: Upload Master Metadata (List, GBBQ & Finance Master)
        uses: actions/upload-artifact@v4
        with:
          name: master-metadata
          path: |
            stock_list_master.json
            gbbq.dat
            finance_master.parquet
          retention-days: 1

  fetch-full-history:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Download Master Metadata
        uses: actions/download-artifact@v4
        with:
          name: master-metadata
          path: .
          
      - name: Install Python & Go Dependencies
        run: |
          pip install -r requirements.txt
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy
          
      - name: Build TDX Go Engine
        run: go build -o tdx_fetcher scripts/tdx_fetcher.go
      
      - name: Fetch Full History (Local gbbq.dat + Finance Master + Sina Flow)
        run: |
          python scripts/fetch_worker.py \
            --index ${{ matrix.task.index }} \
            --codes '${{ toJson(matrix.task.codes) }}' \
            --year 9999
            
      - uses: actions/upload-artifact@v4
        with:
          name: history-part-${{ matrix.task.index }}
          path: temp_parts/*.parquet
          retention-days: 1

  fetch-sectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
          
      - name: Install Runtime Dependencies
        run: pip install -r requirements.txt

      - name: Download Latest Healed Sectors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo scanligithub/em-sector-auto-healer --pattern "Full_Sector_Klines.zip" --clobber

      - name: Transform JSON to Clean Parquet
        run: python scripts/import_healed_sectors.py

      - name: Upload Sector Parquet
        uses: actions/upload-artifact@v4
        with:
          name: sector-parts
          path: temp_parts/*.parquet
          retention-days: 1

  finalize:
    needs: [fetch-full-history, fetch-sectors]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      
      - name: Download Master List
        uses: actions/download-artifact@v4
        with:
          name: master-metadata
          path: .

      - name: Download All Data Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-part*'
          merge-multiple: true
          path: all_artifacts
          
      - name: Merge & Split by Year
        run: |
          python scripts/merge_and_push.py --mode release --year 9999
          
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create archive --title "Historical Archive" --notes "Full A-Share history (2005-Present) with Local Fundamentals" || true
          gh release edit archive --draft=false --prerelease=false
          gh release upload archive output/*.parquet output/*.json output/*.md --clobber

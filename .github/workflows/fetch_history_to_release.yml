name: Fetch Full History to Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

# 必须显式开启写权限以创建 Release
permissions:
  contents: write

jobs:
  # 1. 准备阶段
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install baostock pandas requests urllib3
      - id: set-matrix
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: |
          python scripts/prepare_matrix.py
          echo "matrix=$(cat stock_matrix.json)" >> $GITHUB_OUTPUT
      - name: Upload Pre-fetched Lists
        uses: actions/upload-artifact@v4
        with:
          name: pre-fetched-lists
          path: sector_list.json
          retention-days: 1

  # 2. 全量历史股票下载 (分布式)
  fetch-full-history:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Fetch Full History
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: |
          python scripts/fetch_worker.py \
            --index ${{ matrix.task.index }} \
            --codes '${{ toJson(matrix.task.codes) }}' \
            --year 9999
      - uses: actions/upload-artifact@v4
        with:
          name: history-stock-part-${{ matrix.task.index }}
          path: temp_parts/*.parquet
          retention-days: 1

  # 3. 全量板块历史下载
  fetch-sectors:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Pre-fetched Lists
        uses: actions/download-artifact@v4
        with:
          name: pre-fetched-lists
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Fetch Sectors
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: python scripts/fetch_sector.py
      - uses: actions/upload-artifact@v4
        with:
          name: sector-parts
          path: temp_parts/*.parquet
          retention-days: 1

  # 4. 汇总发布至 Release
  finalize:
    needs: [fetch-full-history, fetch-sectors]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: all_artifacts
      - name: Merge & Split
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: python scripts/merge_and_push.py --mode release --year 9999
      - name: Create GH Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create archive --title "Historical Archive" --notes "Full A-Share history (2005-Present)" || true
          gh release edit archive --draft=false --prerelease=false
          gh release upload archive output/*.parquet output/*.json output/*.md --clobber
      - name: Publish Summary
        if: always()
        run: cat output/qc_summary.md >> $GITHUB_STEP_SUMMARY

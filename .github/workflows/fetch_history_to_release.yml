name: Fetch Full History to Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 🌐 Download Official GBBQ zip (HTTP Mode)
        run: |
          set -euxo pipefail
          URL="http://www.tdx.com.cn/products/data/data/dbf/gbbq.zip"
          curl -L \
               --retry 3 \
               --retry-delay 5 \
               --connect-timeout 30 \
               -o gbbq.zip \
               "${URL}"
          unzip -o gbbq.zip
          mv gbbq gbbq.dat
          ls -lh gbbq.dat

      - name: Install Python GBBQ Decryptor Deps
        run: pip install pytdx pandas

      - name: Run Python GBBQ Decoder (1 second)
        run: |
          python scripts/parse_gbbq.py gbbq.dat gbbq_clean.csv
          ls -lh gbbq_clean.csv

      - name: Initialize Go Module
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy
          
      - id: set-matrix
        name: Build Engine & Generate Matrix
        run: |
          go build -o tdx_fetcher scripts/tdx_fetcher.go
          python scripts/prepare_matrix.py
          echo "matrix=$(cat stock_matrix.json)" >> $GITHUB_OUTPUT
          
      - name: Upload Master Metadata (List & GBBQ)
        uses: actions/upload-artifact@v4
        with:
          name: master-metadata
          path: |
            stock_list_master.json
            gbbq_clean.csv
          retention-days: 1

  fetch-full-history:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Download Master Metadata
        uses: actions/download-artifact@v4
        with:
          name: master-metadata
          path: .
          
      - name: Install Python & Go Dependencies
        run: |
          pip install -r requirements.txt
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy
          
      - name: Build TDX Go Engine
        run: go build -o tdx_fetcher scripts/tdx_fetcher.go
      
      - name: Fetch Full History (Local gbbq_clean.csv + Sina Flow)
        run: |
          python scripts/fetch_worker.py \
            --index ${{ matrix.task.index }} \
            --codes '${{ toJson(matrix.task.codes) }}' \
            --year 9999
            
      - uses: actions/upload-artifact@v4
        with:
          name: history-part-${{ matrix.task.index }}
          path: temp_parts/*.parquet
          retention-days: 1

  fetch-sectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
          
      - name: Install Runtime Dependencies
        run: |
          pip install -r requirements.txt
          pip install polars pytdx pandas pyarrow

      - name: Download Latest Healed Sectors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo scanligithub/em-sector-auto-healer --pattern "Full_Sector_Klines.zip" --clobber

      - name: Transform JSON to Clean Parquet
        run: python scripts/import_healed_sectors.py

      - name: 📈 Fetch Full Historical Index Data (Yahoo Primary + Sina Backup)
        run: |
          python -c '
          import os
          import sys
          import requests
          import pandas as pd
          from datetime import datetime
          
          INDEX_LIST = {
              "sh.000001": "上证指数", "sz.399001": "深证成指", "sz.399006": "创业板指", "sh.000688": "科创50", "bj.899050": "北证50",
              "sh.000016": "上证50", "sh.000300": "沪深300", "sh.000905": "中证500", "sh.000852": "中证1000", "sh.000851": "中证2000",
              "sz.399303": "国证2000", "sz.399330": "深证100", "sh.000090": "上证180", "sz.399324": "深证红利", "sh.000015": "红利指数", 
              "sh.000827": "中证中盘", "sz.399317": "国证1000", "sz.399807": "中证人工智能", "sz.399812": "国证芯片", 
              "sz.399354": "国证人工智能", "sz.399673": "创业板50", "sz.399285": "国证新能源", "sz.399008": "中小100", 
              "sz.399993": "中证信息安全", "sz.399975": "证券公司", "sz.399986": "中证银行", "sz.399932": "中证消费", 
              "sz.399933": "中证医药", "sz.399967": "中证军工", "sz.399989": "中证医疗", "sz.399971": "中证传媒", 
              "sz.399997": "中证白酒", "sh.000934": "中证能源", "sh.000935": "中证原材料", "sz.399990": "煤炭等权", 
              "sz.399998": "中证有色", "sz.399974": "国证国企"
          }
          
          def fetch_yahoo(code):
              # 雅虎历史 K 线接口（无行数限制，传入 range=max 即可拉取上市以来完整几千至上万条历史记录）
              parts = code.split(".")
              suffix = "SS" if parts[0] == "sh" else ("SZ" if parts[0] == "sz" else "BJ")
              yahoo_code = f"{parts[1]}.{suffix}"
              
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{yahoo_code}?range=max&interval=1d"
              headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}
              res = requests.get(url, headers=headers, timeout=15)
              res.raise_for_status()
              
              chart_data = res.json().get("chart", {}).get("result", [None])[0]
              if not chart_data:
                  raise ValueError("No result in response")
              
              timestamps = chart_data.get("timestamp", [])
              indicators = chart_data.get("indicators", {}).get("quote", [{}])[0]
              
              opens = indicators.get("open", [])
              closes = indicators.get("close", [])
              highs = indicators.get("high", [])
              lows = indicators.get("low", [])
              volumes = indicators.get("volume", [])
              
              records = []
              for i in range(len(timestamps)):
                  if opens[i] is None or closes[i] is None:
                      continue
                  date_str = datetime.fromtimestamp(timestamps[i]).strftime("%Y-%m-%d")
                  records.append({
                      "date": date_str, "code": code, "open": float(opens[i]),
                      "high": float(highs[i]), "low": float(lows[i]), "close": float(closes[i]),
                      "volume": float(volumes[i] or 0), "amount": float(volumes[i] or 0) * float(closes[i])
                  })
              return records
          
          def fetch_sina(code):
              # 新浪备用接口，最多只能拉取服务端的物理极限 1023 条
              sina_code = code.replace(".", "")
              url = f"https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol={sina_code}&scale=240&ma=no&datalen=10000"
              res = requests.get(url, timeout=15)
              res.raise_for_status()
              data = res.json()
              if not data:
                  raise ValueError("Empty response")
              records = []
              for item in data:
                  records.append({
                      "date": item["day"][:10], "code": code, "open": float(item["open"]),
                      "high": float(item["high"]), "low": float(item["low"]), "close": float(item["close"]),
                      "volume": float(item["volume"]), "amount": float(item["volume"]) * float(item["close"])
                  })
              return records
          
          all_rows = []
          success_count = 0
          
          for code_str, name in INDEX_LIST.items():
              print(f"📊 Pulling: {code_str} ({name}) ...", end="")
              bars = []
              engine_used = ""
              
              # 历史全量获取时：雅虎优先（无硬性条数截断限制），新浪降级为备用兜底
              try:
                  bars = fetch_yahoo(code_str)
                  engine_used = "Yahoo HTTP (Full History)"
              except Exception as e_yahoo:
                  try:
                      bars = fetch_sina(code_str)
                      engine_used = "Sina HTTP Fallback (Max 1000)"
                  except Exception as e_sina:
                      pass
                      
              if bars:
                  all_rows.extend(bars)
                  success_count += 1
                  print(f" ✅ Success ({engine_used}, {len(bars)} rows)")
              else:
                  print(" ❌ Failed.")
                  
          print(f"\n📋 INDEX DOWNLOAD SUMMARY: {success_count} / {len(INDEX_LIST)} SUCCESS")
          
          if not all_rows:
              sys.exit(1)
              
          df = pd.DataFrame(all_rows)
          df["date_dt"] = pd.to_datetime(df["date"], errors="coerce")
          df = df.dropna(subset=["date_dt"])
          df["date"] = df["date_dt"].dt.strftime("%Y-%m-%d")
          df = df.drop(columns=["date_dt"])
          
          df = df.drop_duplicates(subset=["date", "code"], keep="last")
          df = df.sort_values(["code", "date"])
          
          df["pctChg"] = df.groupby("code")["close"].pct_change() * 100
          df["pctChg"] = df["pctChg"].fillna(0.0)
          
          for col in ["open", "high", "low", "close", "pctChg"]: 
              df[col] = df[col].astype("float32")
          for col in ["volume", "amount"]: 
              df[col] = df[col].astype("float64")
              
          os.makedirs("temp_parts", exist_ok=True)
          out_path = "temp_parts/index_kline_all.parquet"
          df.to_parquet(out_path, index=False)
          print(f"🎉 物理落盘成功至 {out_path} ({len(df)} rows)!")
          '

      - name: Upload Sector Parquet
        uses: actions/upload-artifact@v4
        with:
          name: sector-parts
          path: temp_parts/*.parquet
          retention-days: 1

  finalize:
    needs: [fetch-full-history, fetch-sectors]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install Finalize Dependencies
        run: |
          pip install -r requirements.txt
          pip install polars baostock

      - name: Download Master List (For DuckDB Metadata)
        uses: actions/download-artifact@v4
        with:
          name: master-metadata
          path: .

      - name: Download All Data Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-part*'
          merge-multiple: true
          path: all_artifacts
          
      - name: 🌐 Download All Stocks 37-Column F10 Financial Data
        run: |
          python scripts/fetch_f10_all.py
          ls -lh output/all_stocks_f10_raw.parquet

      - name: ❄️ Fetch All Stocks Full Historical Main Operating Business Detail
        env:
          XQ_A_TOKEN: ${{ secrets.XQ_A_TOKEN }}
        run: |
          python scripts/fetch_f10_mainbus.py
          ls -lh output/all_stocks_mainbus_raw.parquet

      - name: 💾 Restore Earnings Forecast Events from GitHub Cache
        uses: actions/cache/restore@v4
        id: restore-event-cache
        with:
          path: output/event_earnings_forecast.parquet
          key: event-forecast-cache-placeholder
          restore-keys: |
            event-forecast-cache-

      - name: 🛡️ Fallback if No Cache Exists
        run: |
          if [ ! -f output/event_earnings_forecast.parquet ]; then
            echo "⚠️ 未在本地磁盘检测到历史事件文件，启动全新仓库自动初始化..."
            mkdir -p output
            python -c "
            import polars as pl
            schema = {
                'code': pl.Utf8, 'notice_date': pl.Utf8, 'report_date': pl.Utf8,
                'forecast_type': pl.Utf8, 'forecast_yoy_mid': pl.Float64, 'summary': pl.Utf8
            }
            pl.DataFrame([], schema=schema).write_parquet('output/event_earnings_forecast.parquet')
            "
          else
            echo "✅ 物理检测通过：已成功加载 Actions 缓存恢复的历史事件数据（大小：$(ls -lh output/event_earnings_forecast.parquet | awk '{print $5}')）。"
          fi

      - name: Merge & Split by Year
        run: |
          python scripts/merge_and_push.py --mode release --year 9999
          
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create archive --title "Historical Archive" --notes "Full A-Share history (2005-Present) powered by TDX Engine & EastMoney F10 Datacenter" --clobber || true
          gh release upload archive output/*.parquet --clobber
          
      - name: Publish Consolidated Summaries to Workflow Page
        if: always()
        run: |
          if [ -f output/f10_audit_summary.md ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            cat output/f10_audit_summary.md >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/mainbus_audit_summary.md ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            cat output/mainbus_audit_summary.md >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/qc_summary.md ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            cat output/qc_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload QC & Audit Reports to Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-qc-and-audit-reports
          path: |
            output/qc_report.json
            output/qc_summary.md
            output/f10_audit_summary.md
            output/mainbus_audit_summary.md
          retention-days: 7

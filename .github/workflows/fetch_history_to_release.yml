name: Fetch Full History to Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 🌐 Download Official GBBQ zip
        run: |
          set -euxo pipefail
          URL="http://www.tdx.com.cn/products/data/data/dbf/gbbq.zip"
          curl -L --retry 3 -o gbbq.zip "${URL}"
          unzip -o gbbq.zip
          mv gbbq gbbq.dat

      - name: 📥 Download Full History GPCW Zips
        env:
          START_YEAR: "2005"
        run: |
          pip install requests
          python scripts/download_gpcw.py

      # 🌟 关键修改：在这里增加 Python 环境依赖并执行预处理
      - name: 🧠 Pre-Calculate Finance Matrix (TTM & AsOf Prep)
        run: |
          pip install pytdx pandas pyarrow numpy
          python scripts/parse_gpcw.py

      - name: Initialize Go Module
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy
          
      - id: set-matrix
        name: Build Engine & Generate Matrix
        run: |
          go build -o tdx_fetcher scripts/tdx_fetcher.go
          python scripts/prepare_matrix.py
          echo "matrix=$(cat stock_matrix.json)" >> $GITHUB_OUTPUT
          
      # 🌟 关键修改：将提取出的高密度 finance_master 塞入发给 Worker 的资源包中
      - name: Upload Master Metadata
        uses: actions/upload-artifact@v4
        with:
          name: master-metadata
          path: |
            stock_list_master.json
            gbbq.dat
            finance_master.parquet
          retention-days: 1

  fetch-full-history:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Download Master Metadata
        uses: actions/download-artifact@v4
        with:
          name: master-metadata
          path: .
          
      - name: Install Python & Go Dependencies
        run: |
          pip install -r requirements.txt
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy
          
      - name: Build TDX Go Engine
        run: go build -o tdx_fetcher scripts/tdx_fetcher.go
      
      - name: Fetch Full History (Local gbbq.dat + Finance Master + Sina Flow)
        run: |
          python scripts/fetch_worker.py \
            --index ${{ matrix.task.index }} \
            --codes '${{ toJson(matrix.task.codes) }}' \
            --year 9999
            
      - uses: actions/upload-artifact@v4
        with:
          name: history-part-${{ matrix.task.index }}
          path: temp_parts/*.parquet
          retention-days: 1

  fetch-sectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
          
      - name: Install Runtime Dependencies
        run: pip install -r requirements.txt

      - name: Download Latest Healed Sectors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo scanligithub/em-sector-auto-healer --pattern "Full_Sector_Klines.zip" --clobber

      - name: Transform JSON to Clean Parquet
        run: python scripts/import_healed_sectors.py

      - name: Upload Sector Parquet
        uses: actions/upload-artifact@v4
        with:
          name: sector-parts
          path: temp_parts/*.parquet
          retention-days: 1

  finalize:
    needs: [fetch-full-history, fetch-sectors]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      
      - name: Download Master List
        uses: actions/download-artifact@v4
        with:
          name: master-metadata
          path: .

      - name: Download All Data Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-part*'
          merge-multiple: true
          path: all_artifacts
          
      - name: Merge & Split by Year
        run: |
          python scripts/merge_and_push.py --mode release --year 9999
          
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create archive --title "Historical Archive" --notes "Full A-Share history (2005-Present) with Local Fundamentals" || true
          gh release edit archive --draft=false --prerelease=false
          gh release upload archive output/*.parquet output/*.json output/*.md --clobber

name: Fetch Full History to Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install baostock pandas
      - id: set-matrix
        run: |
          python scripts/prepare_matrix.py
          echo "matrix=$(cat stock_matrix.json)" >> $GITHUB_OUTPUT

  fetch-full-history:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - run: pip install -r requirements.txt
      
      - name: Fetch Full History
        run: |
          python scripts/fetch_worker.py \
            --index ${{ matrix.task.index }} \
            --codes '${{ toJson(matrix.task.codes) }}' \
            --year 9999
            
      - uses: actions/upload-artifact@v4
        with:
          name: history-part-${{ matrix.task.index }}
          path: temp_parts/*.parquet
          retention-days: 1

  # ====== 🛡️ 核心改造：引入历史全量自愈板块 ======
  fetch-sectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
          
      - name: Install Runtime Dependencies
        run: |
          pip install -r requirements.txt
          pip install polars

      - name: Download Latest Healed Sectors (跨仓库拉取自愈数据)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo scanligithub/em-sector-auto-healer --pattern "Full_Sector_Klines.zip" --clobber

      - name: Transform JSON to Clean Parquet (对齐精度并清洗)
        run: python scripts/import_healed_sectors.py

      - name: Upload Sector Parquet
        uses: actions/upload-artifact@v4
        with:
          name: sector-parts
          path: temp_parts/*.parquet
          retention-days: 1

  finalize:
    needs: [fetch-full-history, fetch-sectors]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: all_artifacts
          
      - name: Merge & Split by Year
        run: |
          python scripts/merge_and_push.py --mode release --year 9999
          
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create archive --title "Historical Archive" --notes "Full A-Share history (2005-Present)" || true
          gh release edit archive --draft=false --prerelease=false
          gh release upload archive output/*.parquet output/*.json output/*.md --clobber

      - name: Publish Summary
        if: always()
        run: |
          if [ -f output/qc_summary.md ]; then
            cat output/qc_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload QC Report to Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qc-report-full
          path: |
            output/qc_report.json
            output/qc_summary.md
          retention-days: 7

name: Eastmoney Fast API Scraper

on:
  # 允许在 GitHub Actions 网页端手动点击 "Run workflow" 按钮触发
  workflow_dispatch: 
  
  schedule:
    # 每天北京时间下午 15:30 运行 (UTC时间 07:30)
    # 此时 A 股刚收盘，当日行情数据已最终落定且最为稳定
    # 1-5 代表周一到周五运行
    - cron: '30 7 * * 1-5'

jobs:
  scrape-quant-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 可选：利用 Actions 缓存 pip 依赖，进一步提升二次运行速度
          cache: 'pip'
          
      - name: Install Quant Dependencies
        run: |
          python -m pip install --upgrade pip
          # aiohttp: 用于极速、高并发的底层 API 异步请求
          # polars: 预装极速数据处理库，为你后续清洗 JSON 并转存 Parquet 做好准备
          pip install aiohttp polars

      - name: Run Direct API Scraper
        # 执行根目录下的 Python 脚本
        run: python fetch_boards.py

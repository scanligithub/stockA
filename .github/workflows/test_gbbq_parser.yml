name: Test GBBQ Parser

on:
  workflow_dispatch:

jobs:
  test-parser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download Official GBBQ zip (HTTP Mode)
        run: |
          set -euxo pipefail
          URL="http://www.tdx.com.cn/products/data/data/dbf/gbbq.zip"
          curl -L \
               --retry 3 \
               --retry-delay 5 \
               --connect-timeout 30 \
               -o gbbq.zip \
               "${URL}"
          unzip -o gbbq.zip
          mv gbbq gbbq.dat
          ls -lh gbbq.dat

      - name: Install Python Parser Dependencies
        run: |
          pip install pytdx pandas

      - name: Run Python Decoder (1 second)
        run: |
          python scripts/parse_gbbq.py gbbq.dat gbbq_clean.csv
          echo "=========================================================="
          echo "📂 打印由 PyTDX 解密出的前 10 行明文 CSV"
          echo "=========================================================="
          head -n 10 gbbq_clean.csv

      - name: Initialize Go Module & Fetch Deps
        run: |
          go mod init stockA || true
          go get github.com/injoyai/tdx
          go mod tidy

      - name: Build TDX Go Engine
        run: go build -o tdx_fetcher scripts/tdx_fetcher.go

      - name: Run GBBQ Parse & Fetch Verification
        run: |
          ./tdx_fetcher \
            -mode=fetch \
            -codes="sh.600871,sz.002332,sh.603730" \
            -gbbq="gbbq_clean.csv" \
            -out="test_out.csv"

      - name: Display Sample Results (Verification)
        run: |
          echo "=========================================================="
          echo "🔍 [测试结果验证] 打印输出 CSV 的前 25 行记录"
          echo "=========================================================="
          head -n 25 test_out.csv
          
          echo ""
          echo "=========================================================="
          echo "🔍 [测试结果验证] 打印输出 CSV 的后 25 行记录"
          echo "=========================================================="
          tail -n 25 test_out.csv

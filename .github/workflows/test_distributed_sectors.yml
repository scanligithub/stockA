name: Distributed Sector Discovery Test

on:
  workflow_dispatch:

jobs:
  # 第一阶段：分布式“侦察兵”
  fetch-parts:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 定义任务组合：每个 Job 抓取 P1 + 一个特定页
        include:
          - category: Industry
            page: 2
          - category: Industry
            page: 3
          - category: Industry
            page: 4
          - category: Industry
            page: 5
          - category: Concept
            page: 2
          - category: Concept
            page: 3
          - category: Concept
            page: 4
          - category: Concept
            page: 5
          - category: Region
            page: 1
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install requests
        run: pip install requests
      - name: Fetch Part
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: |
          python scripts/test_dist_sector_worker.py \
            --category ${{ matrix.category }} \
            --page ${{ matrix.page }}
      - uses: actions/upload-artifact@v4
        with:
          name: part-${{ matrix.category }}-${{ matrix.page }}
          path: sector_*.json

  # 第二阶段：汇总对账
  finalize:
    needs: fetch-parts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pandas
      - name: Download All Parts
        uses: actions/download-artifact@v4
        with:
          pattern: part-*
          merge-multiple: true
      - name: Merge and Audit
        run: python scripts/test_dist_sector_aggregator.py

name: Test GBBQ HTTP Speed

on:
  workflow_dispatch: # 手动触发

jobs:
  http-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          
      - name: Initialize Test Environment
        run: |
          go mod init discover_tdx || true
          go get github.com/injoyai/tdx@v0.0.81
          go mod tidy
          
      - name: 1. 探测该库所有的子包路径 (go list)
        run: |
          echo "=== [Discovery] Subpackages ==="
          go list github.com/injoyai/tdx/...
          
      - name: 2. 探测主包导出的函数 (go doc main)
        run: |
          echo "=== [Discovery] Main Package Functions ==="
          go doc github.com/injoyai/tdx
          
      - name: 3. 探测协议包导出的函数 (go doc protocol)
        run: |
          echo "=== [Discovery] Protocol Package Functions ==="
          go doc github.com/injoyai/tdx/protocol

name: Test Download gbbq.zip

on:
  workflow_dispatch:

jobs:
  download-gbbq:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download gbbq.zip
        run: |
          set -euxo pipefail

          URL="http://www.tdx.com.cn/products/data/data/dbf/gbbq.zip"

          echo "Downloading from: ${URL}"

          curl -L \
               --retry 3 \
               --retry-delay 5 \
               --connect-timeout 30 \
               --max-time 300 \
               -o gbbq.zip \
               "${URL}"

          echo "Download finished."

      - name: Verify file
        run: |
          set -euxo pipefail

          ls -lh gbbq.zip
          file gbbq.zip || true
          sha256sum gbbq.zip || true

      - name: Unzip test
        run: |
          set -euxo pipefail

          mkdir -p extracted
          unzip -o gbbq.zip -d extracted

          echo "Extracted files:"
          find extracted -type f

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gbbq-download
          path: |
            gbbq.zip
            extracted/**

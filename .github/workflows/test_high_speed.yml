name: High Speed Sector Test

on:
  workflow_dispatch:

jobs:
  speed-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install requests
        run: pip install requests
      - name: Run Speed Test
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: python scripts/test_high_speed_sectors.py

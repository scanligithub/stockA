name: Get Full A-Share List

on:
  workflow_dispatch:  # 手动触发按钮
  schedule:
    - cron: '0 1 * * 1-5' # 周一到周五，北京时间 9:00 运行

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # 修正：确保有 actions/ 前缀

      - name: Set up Python
        uses: actions/setup-python@v5 # 修正：确保有 actions/ 前缀
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare polars

      - name: Run Scraper
        run: python fetch_stock_list.py

      - name: Upload Stock List Artifact
        uses: actions/upload-artifact@v4 # 修正：必须是 actions/upload-artifact
        with:
          name: stock-directory
          path: a_share_list.csv
          retention-days: 7 # 结果在 GitHub 保留 7 天

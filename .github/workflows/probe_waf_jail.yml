name: 🕵️ 探测东财 WAF 刑期 (Jail Duration)

on:
  workflow_dispatch: # 手动触发测试

jobs:
  probe-jail:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 🚀 执行刑期探测脚本
        env:
          # 确保您的 GitHub Secrets 中已经配置了 CF_WORKER_URL
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: python scripts/test_jail_duration.py

name: Sync Eastmoney Sectors

on:
  workflow_dispatch: # 支持手动触发测试
  schedule:
    - cron: '0 18 * * *' # 北京时间凌晨 2:00 自动运行（18:00 UTC）

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 启用 pip 缓存提高后续运行速度

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install baostock aiohttp polars

      - name: Run Sector Sync Script
        # 注意：这里路径必须匹配你脚本在仓库中的实际位置
        run: python scripts/fetch_sectors_with_types.py

      - name: Check Output Files
        run: |
          ls -lh sector_dictionary.csv stock_sector_mapping.csv
          head -n 5 sector_dictionary.csv

      - name: Upload Data Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stock-sector-database
          # 脚本运行后生成的 CSV 文件通常位于根目录
          path: |
            sector_dictionary.csv
            stock_sector_mapping.csv
          retention-days: 7 # 结果在 GitHub 保留 7 天

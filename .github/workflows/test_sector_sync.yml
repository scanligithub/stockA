name: Eastmoney Sector Sync Test

on:
  workflow_dispatch: # 手动触发测试
  push:
    branches: [ main ] # 也可以在推送到 main 时触发

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install baostock aiohttp polars

      - name: Run Sector Fetcher
        run: python fetch_sectors.py

      - name: Upload Results
        uses: actions/upload-artifact@v4 # 修正：添加了 actions/ 前缀
        with:
          name: cleaned-sector-list
          path: sector_list_cleaned.csv

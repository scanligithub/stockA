name: Fetch Board List

on:
  schedule:
    - cron: "0 1 * * *"   # 每天 UTC 1点（北京时间 9 点）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: setup python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: install deps
      run: |
        pip install akshare pandas

    - name: run script
      run: |
        python fetch_boards.py

    - name: commit result
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add *.csv
        git commit -m "update boards data" || echo "no changes"
        git push
